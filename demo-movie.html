<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TOMORI — Demo Movie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#16a34a;--gl:#4ade80;--gold:#d97706;--amber:#fb923c;
  --dark:#0f2218;--dark2:#162d1c;
  --text-dark:#0f2218;--text-mid:#374151;--text-dim:#6b7280;
  --card-light:rgba(240,253,244,.92);
}
body{
  width:100vw;height:100vh;overflow:hidden;
  font-family:'Hiragino Kaku Gothic Pro','Hiragino Sans',Meiryo,'Yu Gothic',sans-serif;
  background:linear-gradient(135deg,#ffffff 0%,#f0fdf4 45%,#ecfdf5 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
}

/* ── LAYOUT ── */
.stage{
  display:flex;align-items:center;justify-content:center;
  gap:70px;width:100%;padding:28px 80px 20px;
}

/* ── LEFT: feature text ── */
.fp{
  width:400px;flex-shrink:0;
  opacity:0;transform:translateX(-20px);
  transition:opacity .55s ease,transform .55s ease;
}
.fp.on{opacity:1;transform:none}
.fb{
  display:inline-block;font-size:14px;letter-spacing:.18em;font-weight:700;
  color:#fff;background:var(--g);
  text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:18px;
}
.ft{
  font-size:52px;font-weight:900;color:var(--text-dark);
  line-height:1.15;margin-bottom:18px;white-space:pre-line;
  letter-spacing:-.02em;
}
.fd{
  font-size:19px;color:var(--text-mid);line-height:1.85;
  white-space:pre-line;border-left:4px solid #bbf7d0;padding-left:16px;
}

/* ── RIGHT: Phone ── */
.phone{
  position:relative;width:340px;height:720px;
  background:var(--dark2);border-radius:48px;
  border:3px solid rgba(22,163,74,.45);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.8),
    0 20px 60px rgba(0,50,20,.18),
    0 4px 20px rgba(0,0,0,.08),
    inset 0 0 30px rgba(0,0,0,.15);
  overflow:hidden;flex-shrink:0;
}
.notch{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:80px;height:22px;background:var(--dark2);border-radius:14px;z-index:100;
}
.sw{position:absolute;inset:0;overflow:hidden}
.sc{
  position:absolute;inset:0;opacity:0;
  transition:opacity .5s ease;padding-top:32px;
  display:flex;flex-direction:column;overflow:hidden;
}
.sc.on{opacity:1}
.tbar{
  position:absolute;bottom:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,#4ade80,#facc15);z-index:200;
}

/* ── BOTTOM: Progress & title ── */
.bottom-bar{
  display:flex;align-items:center;gap:16px;padding:10px 0 0;
}
.scene-title{
  font-size:15px;letter-spacing:.06em;color:var(--text-dim);font-weight:500;
}
.pdots{display:flex;gap:6px;align-items:center}
.pd{width:7px;height:7px;border-radius:50%;background:#d1fae5;cursor:pointer;transition:all .3s}
.pd.on{width:22px;border-radius:4px;background:var(--g);box-shadow:0 0 8px rgba(22,163,74,.4)}
.hint{position:fixed;top:16px;right:24px;font-size:11px;color:#9ca3af;letter-spacing:.06em}

/* ── SCENE SHARED (inside phone) ── */
.shud{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:rgba(10,28,16,.9);border-bottom:1px solid rgba(74,222,128,.12);
  font-size:10px;color:#4ade80;font-weight:900;flex-shrink:0;
}
.shud-track{flex:1;height:5px;background:rgba(74,222,128,.1);border-radius:3px;overflow:hidden}
.shud-fill{height:100%;background:linear-gradient(90deg,#4ade80,#facc15);border-radius:3px}
.ff{position:absolute;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite;animation-delay:var(--dl,0s)}
.sbtn{
  width:calc(100% - 28px);margin:0 14px;padding:13px;border-radius:12px;
  background:linear-gradient(135deg,rgba(74,222,128,.22),rgba(74,222,128,.1));
  border:1.5px solid rgba(74,222,128,.5);color:#4ade80;
  font-size:13px;font-weight:900;text-align:center;
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes cardIn{from{transform:translateY(16px) scale(.93);opacity:0}to{transform:none;opacity:1}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(22px);opacity:0}to{transform:none;opacity:1}}
@keyframes typeCursor{0%,100%{opacity:1}50%{opacity:0}}
@keyframes streakPop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(74,222,128,.2)}50%{box-shadow:0 0 22px rgba(74,222,128,.55)}}
</style>

<script>
var ff=function(n){
  var cl=['#fef08a','#86efac','#fde68a','#a3e635','#d9f99d'],h='';
  for(var i=0;i<n;i++){
    var x=(Math.random()*88+5).toFixed(1),y=(Math.random()*88+5).toFixed(1);
    var s=(1.5+Math.random()*3).toFixed(1),c=cl[i%cl.length];
    var d=(1.5+Math.random()*2.5).toFixed(1),dl=(Math.random()*2.5).toFixed(1);
    h+='<div class="ff" style="left:'+x+'%;top:'+y+'%;width:'+s+'px;height:'+s+'px;background:'+c+';box-shadow:0 0 '+(s*2.5).toFixed(1)+'px '+c+';--d:'+d+'s;--dl:'+dl+'s"></div>';
  }
  return h;
};

/* ── Engine ── */
var cur=0,autoTimer=null,paused=false,scTimer=null;

function mkDots(){
  var c=document.getElementById('pdots');
  SCENES.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='pd';d.id='pd'+i;
    d.onclick=function(e){e.stopPropagation();show(i);};
    c.appendChild(d);
  });
}

function show(n){
  cur=(n+SCENES.length)%SCENES.length;
  var sc=SCENES[cur];
  var sw=document.getElementById('sw');
  var fp=document.getElementById('fp');
  clearTimeout(autoTimer);clearInterval(scTimer);
  var old=sw.querySelector('.sc.on');
  if(old) old.classList.remove('on');
  fp.classList.remove('on');
  setTimeout(function(){
    sw.innerHTML=sc.html;
    var el=sw.querySelector('.sc');
    if(el) setTimeout(function(){el.classList.add('on');},40);
    document.getElementById('fb').textContent=sc.badge;
    document.getElementById('ft').textContent=sc.title;
    document.getElementById('fd').textContent=sc.desc;
    document.getElementById('st').textContent=sc.sub;
    fp.classList.add('on');
    document.querySelectorAll('.pd').forEach(function(d,i){d.classList.toggle('on',i===cur);});
    var tbar=document.getElementById('tbar');
    tbar.style.transition='none';tbar.style.width='0%';
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      tbar.style.transition='width '+sc.d+'ms linear';tbar.style.width='100%';
    });});
    if(cur===3){
      var msgs=['読んでいます…','ひらめきを探してるよ…','もうすぐだよ！'];var mi=0;
      scTimer=setInterval(function(){
        mi=(mi+1)%msgs.length;
        var el2=document.getElementById('thinkMsg');
        if(el2){el2.style.opacity='0';setTimeout(function(){if(el2){el2.textContent=msgs[mi];el2.style.opacity='1';}},250);}
      },1900);
    }
    if(!paused) autoTimer=setTimeout(function(){show(cur+1);},sc.d);
  },320);
}

mkDots();show(0);
document.body.onclick=function(){show(cur+1);};
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();paused=!paused;if(!paused)autoTimer=setTimeout(function(){show(cur+1);},SCENES[cur].d);else clearTimeout(autoTimer);}
  if(e.code==='ArrowRight') show(cur+1);
  if(e.code==='ArrowLeft')  show(cur-1);
});
</script>
