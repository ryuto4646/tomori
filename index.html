<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tomori - 学びモンスター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic Pro', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ---- Screen Base ---- */
.screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding: 24px 20px 32px;
  animation: fadeIn 0.35s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- Buttons ---- */
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 0.05em;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  box-shadow: 0 4px 20px rgba(247,151,30,0.4);
}
.btn-secondary {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
}
.btn-success {
  background: linear-gradient(135deg, #11998e, #38ef7d);
  color: #fff;
  box-shadow: 0 4px 20px rgba(56,239,125,0.35);
}
.btn-danger {
  background: linear-gradient(135deg, #f953c6, #b91d73);
  color: #fff;
  box-shadow: 0 4px 20px rgba(249,83,198,0.35);
}

.btn + .btn { margin-top: 12px; }

/* ---- Screen 1: TOP ---- */
#screen-top {
  background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
}

.top-logo {
  font-size: 72px;
  margin-bottom: 8px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}

.top-title {
  font-size: 36px;
  font-weight: 900;
  color: #ffd200;
  text-shadow: 0 0 20px rgba(255,210,0,0.5);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.top-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 48px;
  line-height: 1.6;
}
.top-stars {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 3px; height: 3px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50%     { opacity: 1; transform: scale(1.5); }
}

/* ---- Screen 2: UPLOAD ---- */
#screen-upload {
  background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
}
.screen-header {
  margin-bottom: 24px;
}
.screen-step {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.screen-title {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
}
.screen-title span { color: #ffd200; }

.upload-area {
  border: 3px dashed rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.04);
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
}
.upload-area:hover { border-color: #ffd200; background: rgba(255,210,0,0.05); }
.upload-area.has-image { border-style: solid; border-color: #38ef7d; padding: 12px; }

.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-text { color: rgba(255,255,255,0.7); font-size: 15px; }
.upload-hint { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 6px; }

#photo-preview {
  width: 100%;
  max-height: 240px;
  object-fit: contain;
  border-radius: 12px;
  display: none;
}
#file-input { display: none; }

.category-section {
  margin-bottom: 20px;
  display: none;
}
.category-label {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 10px;
  font-weight: bold;
}
.category-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  padding: 8px 14px;
  border-radius: 24px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
/* legacy chip （非使用） */
.chip.selected { border-color: #ffd200; background: rgba(255,210,0,0.15); color: #ffd200; font-weight: bold; }

/* ---- Category visual grid ---- */
.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.cat-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 6px 10px;
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.cat-card:hover  { border-color: rgba(255,210,0,0.6); background: rgba(255,210,0,0.08); transform: translateY(-2px); }
.cat-card.selected { border-color: #ffd200; background: rgba(255,210,0,0.15); }
.cat-card.error-chip { border-color: #f953c6 !important; background: rgba(249,83,198,0.12) !important; animation: chipShake 0.35s ease; }
.cat-emoji { font-size: 34px; margin-bottom: 6px; line-height: 1; }
.cat-label { font-size: 11px; color: rgba(255,255,255,0.85); font-weight: bold; letter-spacing: 0.02em; }
.cat-card.selected .cat-label { color: #ffd200; }

/* ---- Trait visual grid ---- */
.trait-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px; flex: 1; margin-bottom: 20px;
}
.trait-grid-card {
  border-radius: 20px; padding: 22px 12px 16px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  cursor: pointer; text-align: center; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.trait-grid-card:hover { border-color: rgba(247,151,30,0.5); background: rgba(247,151,30,0.08); transform: translateY(-2px); }
.trait-grid-card.selected { border-color: #f7971e; background: rgba(247,151,30,0.15); }
.trait-grid-card.pop { animation: cardPop 0.25s ease; }
.tgc-emoji { font-size: 48px; display: block; margin-bottom: 10px; line-height: 1; }
.tgc-name  { font-size: 13px; font-weight: bold; color: #fff; line-height: 1.3; }
.tgc-desc  { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 4px; }
.trait-grid-card.selected .tgc-name { color: #f7971e; }

/* ---- Visual choice buttons (3-col grid) ---- */
.visual-choices {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.vcb {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px;
  padding: 14px 6px 12px;
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  cursor: pointer; transition: all 0.18s;
  min-height: 80px; position: relative; overflow: hidden;
  text-align: center;
}
.vcb:hover   { border-color: #f7971e; background: rgba(247,151,30,0.1); transform: translateY(-2px); }
.vcb.selected { border-color: #f7971e; background: rgba(247,151,30,0.2); }
.vcb.selected::after { content: '✓'; position: absolute; top: 6px; right: 8px; color: #ffd200; font-size: 12px; font-weight: 900; }
.vcb-icon  { font-size: 32px; line-height: 1; }
.vcb-label { font-size: 11px; color: rgba(255,255,255,0.85); font-weight: bold; line-height: 1.3; }
/* 2-col fallback for choose+why */
.visual-choices.col2 { grid-template-columns: repeat(2, 1fr); }
/* No-emoji fallback: just show text */
.vcb-text-only { font-size: 13px; color: #fff; font-weight: bold; line-height: 1.4; }

.chip.error-chip { border-color: #f953c6 !important; background: rgba(249,83,198,0.12) !important; color: #f953c6 !important; animation: chipShake 0.35s ease; }
@keyframes chipShake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  60%     { transform: translateX(6px); }
}

.category-hint {
  font-size: 12px; color: #38ef7d; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
  animation: fadeIn 0.3s ease;
}
.category-error {
  margin-top: 10px; padding: 10px 14px;
  background: rgba(249,83,198,0.12);
  border: 1px solid rgba(249,83,198,0.4);
  border-radius: 12px;
  font-size: 13px; color: #f953c6;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}

/* ---- Screen 3: TRAIT ---- */
#screen-trait {
  background: linear-gradient(160deg, #1a1a2e, #2d1b69, #11001c);
}
.trait-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
  margin-bottom: 20px;
}
.trait-card {
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 14px;
}
.trait-card:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
.trait-card.selected { border-color: #f7971e; background: rgba(247,151,30,0.12); }
.trait-emoji { font-size: 28px; flex-shrink: 0; }
.trait-info { flex: 1; }
.trait-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 2px; }
.trait-desc { font-size: 12px; color: rgba(255,255,255,0.55); }
.trait-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.trait-card.selected .trait-check {
  background: #f7971e;
  border-color: #f7971e;
}

/* ---- Screen 4: MONSTER ---- */
#screen-monster {
  background: linear-gradient(160deg, #0d0d0d, #1a0030, #000428);
  align-items: center;
  text-align: center;
}
.monster-photo-wrap {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
  max-height: 180px;
  background: rgba(255,255,255,0.05);
}
.monster-photo-wrap img {
  width: 100%;
  max-height: 180px;
  object-fit: cover;
  display: block;
}
.monster-appear-text {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.monster-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 24px 20px;
  width: 100%;
  margin-bottom: 24px;
}
.monster-emoji {
  font-size: 80px;
  display: block;
  margin-bottom: 12px;
  animation: monsterBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97) both;
}
@keyframes monsterBounce {
  0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  80%  { transform: scale(0.95) rotate(-3deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.monster-type {
  font-size: 11px;
  color: #ffd200;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.monster-name {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
}
.monster-message {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
  font-style: italic;
}

/* ---- Screen 5: MISSIONS ---- */
#screen-missions {
  background: linear-gradient(160deg, #0a1628, #0f3460, #1a1a2e);
}
.mission-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
  margin-bottom: 20px;
}
.mission-card {
  border-radius: 18px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}
.mission-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.08;
}
.mission-card.lv1 { background: rgba(56,239,125,0.1); border-color: rgba(56,239,125,0.3); }
.mission-card.lv2 { background: rgba(247,151,30,0.1); border-color: rgba(247,151,30,0.3); }
.mission-card.lv3 { background: rgba(249,83,198,0.1); border-color: rgba(249,83,198,0.3); }
.mission-card.selected.lv1 { border-color: #38ef7d; background: rgba(56,239,125,0.18); }
.mission-card.selected.lv2 { border-color: #f7971e; background: rgba(247,151,30,0.18); }
.mission-card.selected.lv3 { border-color: #f953c6; background: rgba(249,83,198,0.18); }
.mission-card:hover { transform: translateY(-2px); }

.mission-card-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.mission-type-icon { font-size: 22px; }

.mission-level-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.05em;
}
.lv1 .mission-level-badge { background: rgba(56,239,125,0.25); color: #38ef7d; }
.lv2 .mission-level-badge { background: rgba(247,151,30,0.25); color: #f7971e; }
.lv3 .mission-level-badge { background: rgba(249,83,198,0.25); color: #f953c6; }

.mission-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 6px; }
.mission-body  { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.5; }

.mission-hint {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-bottom: 12px;
}

/* ---- Screen 6: ANSWER ---- */
#screen-answer {
  background: linear-gradient(160deg, #1a1a2e, #2d0052, #1a1a2e);
}
.answer-mission-card {
  background: rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 24px;
  border-left: 4px solid #f7971e;
}
.answer-mission-level {
  font-size: 11px;
  color: #f7971e;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.answer-mission-title { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 8px; }
.answer-mission-body  { font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.6; }

.answer-label {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
  font-weight: bold;
}
.answer-choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  margin-bottom: 20px;
}
.choice-btn {
  padding: 14px 18px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.choice-btn:hover   { border-color: #f7971e; background: rgba(247,151,30,0.1); }
.choice-btn.selected { border-color: #f7971e; background: rgba(247,151,30,0.2); font-weight: bold; }

.answer-textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  color: #fff;
  font-size: 15px;
  padding: 14px;
  resize: none;
  font-family: inherit;
  min-height: 120px;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}
.answer-textarea:focus { outline: none; border-color: #f7971e; }
.answer-textarea::placeholder { color: rgba(255,255,255,0.3); }

.audio-ui {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,0.1);
}
.mic-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f953c6, #b91d73);
  border: none;
  font-size: 32px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(249,83,198,0.4);
  transition: transform 0.1s;
}
.mic-btn:active { transform: scale(0.93); }
.mic-hint { color: rgba(255,255,255,0.5); font-size: 13px; }

/* ---- Screen 7: RESULT ---- */
#screen-result {
  background: linear-gradient(160deg, #0d0d0d, #1a0030, #000428);
  align-items: center;
  text-align: center;
}
.result-xp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: rgba(255,210,0,0.15);
  border: 1px solid rgba(255,210,0,0.3);
  border-radius: 20px;
  color: #ffd200;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 20px;
}
.result-monster-emoji {
  font-size: 80px;
  display: block;
  margin-bottom: 16px;
  animation: resultPop 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both;
}
@keyframes resultPop {
  0%  { transform: scale(0.5) rotate(-15deg); opacity: 0; }
  70% { transform: scale(1.15) rotate(5deg); }
  100%{ transform: scale(1) rotate(0); opacity: 1; }
}
.result-badge {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-reaction {
  font-size: 26px;
  font-weight: 900;
  color: #ffd200;
  margin-bottom: 12px;
  line-height: 1.3;
  text-shadow: 0 0 20px rgba(255,210,0,0.4);
}
.result-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
  line-height: 1.6;
}
.result-effect {
  font-size: 14px;
  color: #38ef7d;
  font-weight: bold;
  margin-bottom: 32px;
}
.confetti-wrap {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -10px;
  width: 8px; height: 12px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.result-buttons { width: 100%; }

/* ---- Misc ---- */
.spacer { flex: 1; }
.mt-auto { margin-top: auto; }

/* XP bar (mini) */
.xp-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 20px;
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 3px;
  transition: width 1s ease;
}

.back-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.back-btn:hover { color: rgba(255,255,255,0.7); }

/* ============================================
   INLINE RESULT (State B of Screen 6)
   ============================================ */
#inline-result {
  flex-direction: column;
  animation: fadeIn 0.35s ease;
  position: relative;
  overflow: hidden;
}

.inline-confetti {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; overflow: hidden;
}

/* XP bar */
.inline-xp-bar-wrap {
  height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden; margin-bottom: 16px;
}
.inline-xp-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg,#f7971e,#ffd200);
  border-radius: 3px; transition: width 1s ease;
}

/* フィードバック */
.inline-feedback {
  text-align: center;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 24px;
}
.inline-xp-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 14px;
  background: rgba(255,210,0,0.15); border: 1px solid rgba(255,210,0,0.3);
  border-radius: 20px; color: #ffd200; font-size: 13px; font-weight: bold;
  margin-bottom: 16px;
}
.inline-monster-emoji {
  font-size: 72px; display: block; margin-bottom: 12px;
  animation: resultPop 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both;
}
.inline-badge {
  font-size: 11px; letter-spacing: 0.2em;
  color: rgba(255,255,255,0.4); margin-bottom: 6px;
}
.inline-reaction {
  font-size: 22px; font-weight: 900; color: #ffd200;
  margin-bottom: 8px; line-height: 1.4;
  text-shadow: 0 0 16px rgba(255,210,0,0.35);
}
.inline-sub {
  font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 6px;
}
.inline-effect {
  font-size: 13px; color: #38ef7d; font-weight: bold;
}

/* ---- 雑学カード ---- */
.trivia-card {
  border-radius: 22px;
  overflow: hidden;
  margin: 4px 0 20px;
  border: 1.5px solid rgba(139,92,246,0.45);
  animation: triviaIn 0.5s ease 0.4s both;
  display: none;
}
@keyframes triviaIn {
  from { opacity: 0; transform: translateY(14px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.trivia-visual {
  height: 130px;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px;
  position: relative; overflow: hidden;
}
.trivia-visual::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.35));
}
.trivia-content {
  background: rgba(255,255,255,0.06);
  padding: 14px 16px 16px;
}
.trivia-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.trivia-header {
  font-size: 11px; font-weight: 900; letter-spacing: 0.1em; color: #a78bfa;
  display: flex; align-items: center; gap: 5px;
}
.trivia-save-btn {
  background: none; border: 1.5px solid rgba(255,210,0,0.4);
  border-radius: 20px; color: rgba(255,210,0,0.7);
  font-size: 12px; font-weight: bold; padding: 4px 12px;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.trivia-save-btn.saved {
  background: rgba(255,210,0,0.18); border-color: #ffd200; color: #ffd200;
}
.trivia-text {
  font-size: 14px; color: rgba(255,255,255,0.92); line-height: 1.7;
  font-weight: 500; margin-bottom: 14px;
}
.trivia-dive-btn {
  display: block; width: 100%; padding: 11px;
  background: linear-gradient(135deg, rgba(139,92,246,0.35), rgba(91,33,182,0.35));
  border: 1.5px solid rgba(139,92,246,0.5);
  border-radius: 14px; color: #c4b5fd;
  font-size: 13px; font-weight: bold;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.03em;
}
.trivia-dive-btn:hover { background: rgba(139,92,246,0.45); color: #fff; }

/* 次の探究 ヘッダー */
.next-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px;
}
.next-header-title {
  font-size: 16px; font-weight: 800; color: #fff;
}
.next-header-hint {
  font-size: 11px; color: rgba(255,255,255,0.4);
}

/* 横スクロール */
.next-scroll-wrap {
  overflow-x: auto;
  margin: 0 -20px;
  padding: 0 20px 12px;
  scrollbar-width: none;
}
.next-scroll-wrap::-webkit-scrollbar { display: none; }
.next-scroll {
  display: flex; gap: 12px;
  padding-right: 20px;
  width: max-content;
  scroll-snap-type: x mandatory;
}

/* 次の探究カード */
.next-card {
  width: 190px; flex-shrink: 0;
  border-radius: 18px; padding: 14px;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  display: flex; flex-direction: column; gap: 6px;
  scroll-snap-align: start;
  transition: transform 0.2s, border-color 0.2s;
  animation: missionIn 0.4s ease both;
}
.next-card:nth-child(1){ animation-delay:0.05s; }
.next-card:nth-child(2){ animation-delay:0.15s; }
.next-card:nth-child(3){ animation-delay:0.25s; }
.next-card:nth-child(4){ animation-delay:0.35s; }
.next-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.3); }
.next-card:active { transform: scale(0.97); }

.next-card-level {
  display: inline-block; padding: 2px 8px;
  border-radius: 12px; font-size: 10px; font-weight: bold;
  letter-spacing: 0.05em;
}
.lv1 .next-card-level { background: rgba(56,239,125,0.2); color: #38ef7d; }
.lv2 .next-card-level { background: rgba(247,151,30,0.2); color: #f7971e; }
.lv3 .next-card-level { background: rgba(249,83,198,0.2); color: #f953c6; }
.next-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.next-card-type {
  font-size: 20px;
}
.next-card-title {
  font-size: 13px; font-weight: bold; color: #fff; line-height: 1.4;
}
.next-card-body {
  font-size: 11px; color: rgba(255,255,255,0.55); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.next-card-cta {
  margin-top: auto; font-size: 12px; color: #ffd200;
  font-weight: bold; display: flex; align-items: center; gap: 4px;
}

/* フッター */
.inline-footer { margin-top: 20px; }

/* ============================================
   RETRY OVERLAY
   ============================================ */
#retry-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  animation: fadeInOverlay 0.2s ease;
  padding: 32px;
}
@keyframes fadeInOverlay {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.retry-box {
  background: #1a1a2e;
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  max-width: 320px;
  width: 100%;
  animation: retryBoxIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes retryBoxIn {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.retry-monster-emoji {
  font-size: 64px;
  display: block;
  margin-bottom: 16px;
  animation: retryWiggle 0.5s ease;
}
@keyframes retryWiggle {
  0%,100% { transform: rotate(0); }
  20%  { transform: rotate(-10deg) scale(1.1); }
  60%  { transform: rotate(10deg) scale(1.1); }
}
.retry-title {
  font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 8px;
}
.retry-msg {
  font-size: 15px; color: rgba(255,255,255,0.65); margin-bottom: 12px; line-height: 1.5;
}
.retry-attempts {
  font-size: 12px; color: #f7971e; font-weight: bold; margin-bottom: 24px;
}
.retry-attempts.danger { color: #f953c6; }

/* ---- Char counter ---- */
.char-counter {
  text-align: right; font-size: 12px;
  margin-top: -8px; margin-bottom: 12px;
  transition: color 0.3s; font-weight: bold;
}
.char-counter.ok   { color: #38ef7d; }
.char-counter.warn { color: rgba(255,255,255,0.35); }
.char-counter.bonus { color: #ffd200; }

/* ---- Star rating ---- */
.star-rating {
  display: flex; justify-content: center; gap: 6px;
  margin-bottom: 12px; padding: 20px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px; border: 2px solid rgba(255,255,255,0.1);
}
.star-btn {
  font-size: 38px; background: none; border: none; cursor: pointer;
  transition: transform 0.15s; padding: 2px;
  filter: grayscale(1) opacity(0.3);
}
.star-btn.lit { filter: none; }
.star-btn.lit:last-child { animation: starPop 0.2s ease; }
@keyframes starPop {
  0%  { transform: scale(1); }
  50% { transform: scale(1.35); }
  100%{ transform: scale(1); }
}
.star-label {
  text-align: center; font-size: 14px;
  color: rgba(255,255,255,0.65); margin-bottom: 20px; min-height: 20px;
  transition: all 0.2s;
}

/* ---- Choose + Why ---- */
.why-section { animation: fadeIn 0.3s ease; }
.why-label {
  font-size: 13px; color: #f7971e; font-weight: bold;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.why-divider {
  border: none; border-top: 1px solid rgba(255,255,255,0.1);
  margin: 12px 0 16px;
}

/* ============================================
   ANIMATION ENHANCEMENTS
   ============================================ */

/* Screen slide-in from right (forward) */
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(36px); }
  to   { opacity: 1; transform: translateX(0); }
}
/* Screen slide-in from left (back) */
@keyframes fadeInBack {
  from { opacity: 0; transform: translateX(-36px); }
  to   { opacity: 1; transform: translateX(0); }
}
.screen.back-enter.active { animation: fadeInBack 0.35s cubic-bezier(0.25,0.46,0.45,0.94); }

/* ---- Button shimmer ---- */
.btn-primary { position: relative; overflow: hidden; }
.btn-primary::after {
  content: '';
  position: absolute;
  top: 0; left: -150%;
  width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  animation: btnShimmer 2.8s ease-in-out infinite;
}
@keyframes btnShimmer {
  0%   { left: -150%; }
  45%  { left: 150%; }
  100% { left: 150%; }
}

/* ---- Mission card staggered entrance ---- */
.mission-card { animation: missionIn 0.45s ease both; }
.mission-card:nth-child(1) { animation-delay: 0.05s; }
.mission-card:nth-child(2) { animation-delay: 0.17s; }
.mission-card:nth-child(3) { animation-delay: 0.29s; }
@keyframes missionIn {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
/* Card selected pop */
@keyframes cardPop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.045); }
  100% { transform: scale(1); }
}
.trait-card.pop { animation: cardPop 0.25s ease; }

/* ---- Ripple ---- */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  transform: scale(0);
  animation: rippleAnim 0.5s linear forwards;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(5); opacity: 0; }
}

/* ---- Shockwave rings (monster screen) ---- */
.shockwave {
  position: absolute;
  top: 50%; left: 50%;
  width: 70px; height: 70px;
  margin: -35px 0 0 -35px;
  border-radius: 50%;
  border: 3px solid #ffd200;
  animation: shockwaveExpand 0.75s ease-out forwards;
  pointer-events: none;
}
.shockwave.r2 { animation-delay: 0.18s; border-color: #f7971e; }
.shockwave.r3 { animation-delay: 0.36s; border-color: rgba(249,83,198,0.6); }
@keyframes shockwaveExpand {
  from { transform: scale(0); opacity: 1; }
  to   { transform: scale(6); opacity: 0; }
}

/* Monster card glow on appear */
.monster-card { transition: box-shadow 0.6s, border-color 0.6s; }
.monster-card.glowing {
  box-shadow: 0 0 36px rgba(255,210,0,0.3), 0 0 70px rgba(255,210,0,0.1);
  border-color: rgba(255,210,0,0.4);
}

/* Monster appear text pulse */
.monster-appear-text { animation: maPulse 1.2s ease-in-out infinite; }
@keyframes maPulse {
  0%,100% { opacity: 0.45; letter-spacing: 0.20em; }
  50%     { opacity: 1;    letter-spacing: 0.32em; }
}

/* Screen flash on monster reveal */
#screen-monster { transition: background 0.1s; }
#screen-monster.flashing { animation: monsterFlash 0.5s ease; }
@keyframes monsterFlash {
  0%   { background: linear-gradient(160deg,#0d0d0d,#1a0030,#000428); }
  15%  { background: linear-gradient(160deg,#200050,#3d0080,#001060); }
  100% { background: linear-gradient(160deg,#0d0d0d,#1a0030,#000428); }
}

/* Result: burst particles */
.burst-piece {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  top: 50%; left: 50%;
  pointer-events: none;
  animation: burstFly 0.65s ease-out forwards;
}
@keyframes burstFly {
  from { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  to   { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
}

/* XP count-up pop */
@keyframes xpNumPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.5); color: #fff; }
  100% { transform: scale(1); }
}
.xp-pop { display: inline-block; animation: xpNumPop 0.4s ease; }

/* Choice selected checkmark */
.choice-btn { position: relative; overflow: hidden; }
.choice-btn.selected { padding-right: 40px; }
.choice-btn.selected::after {
  content: '✓';
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  color: #ffd200;
  font-weight: 900;
  animation: checkPop 0.2s ease;
}
@keyframes checkPop {
  from { transform: translateY(-50%) scale(0) rotate(-45deg); }
  to   { transform: translateY(-50%) scale(1) rotate(0); }
}
/* ---- フォルダ画面 ---- */
#screen-folder {
  background: linear-gradient(160deg, #1a0533, #2d1b69, #1a1a2e);
}
.folder-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: rgba(255,255,255,0.4); text-align: center;
}
.folder-empty-icon { font-size: 56px; }
.folder-empty-msg  { font-size: 15px; }
.folder-empty-hint { font-size: 12px; color: rgba(255,255,255,0.3); }
.folder-list { display: flex; flex-direction: column; gap: 14px; flex: 1; }
.folder-item {
  border-radius: 20px; overflow: hidden;
  border: 1.5px solid rgba(139,92,246,0.35);
  animation: missionIn 0.35s ease both;
}
.folder-item-visual {
  height: 90px; display: flex; align-items: center; justify-content: center;
  font-size: 52px; position: relative;
}
.folder-item-visual::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.4));
}
.folder-item-body {
  background: rgba(255,255,255,0.06); padding: 12px 14px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.folder-item-text {
  font-size: 13px; color: rgba(255,255,255,0.9); line-height: 1.6; flex: 1;
}
.folder-item-del {
  background: none; border: none; color: rgba(255,255,255,0.3);
  font-size: 18px; cursor: pointer; padding: 0 0 0 8px; flex-shrink: 0;
  transition: color 0.15s;
}
.folder-item-del:hover { color: #f953c6; }
.folder-clear-btn {
  margin-top: 16px;
  background: rgba(249,83,198,0.1); border: 1.5px solid rgba(249,83,198,0.3);
  border-radius: 14px; color: rgba(249,83,198,0.7);
  font-size: 13px; padding: 10px; cursor: pointer; width: 100%;
  transition: all 0.18s;
}
.folder-clear-btn:hover { background: rgba(249,83,198,0.2); color: #f953c6; }
</style>
</head>
<body>
<div id="app">

  <!-- ===== SCREEN 1: TOP ===== -->
  <div class="screen active" id="screen-top">
    <div class="top-stars" id="stars-container"></div>
    <div class="top-logo">🌟</div>
    <div class="top-title">Tomori</div>
    <div class="top-subtitle">写真から学びが始まる<br>探究ミッションアプリ</div>
    <button class="btn btn-primary" onclick="startApp()" style="max-width:280px">
      ✨ はじめる
    </button>
    <button class="btn btn-secondary" id="folder-btn" onclick="goTo('folder');buildFolderScreen()"
      style="max-width:280px;margin-top:12px;font-size:15px;padding:13px;display:none">
      📁 マイ雑学フォルダ <span id="folder-count-badge"></span>
    </button>
  </div>

  <!-- ===== SCREEN 2: TRAIT（はじめるの直後）===== -->
  <div class="screen" id="screen-trait">
    <button class="back-btn" onclick="goTo('top')">← もどる</button>
    <div class="screen-header">
      <div class="screen-title" id="trait-question-title">いまの気分は？</div>
    </div>

    <div class="trait-list" id="trait-list">
      <!-- JS生成 -->
    </div>

    <button class="btn btn-primary" id="trait-next-btn" onclick="goTo('upload')" disabled style="opacity:0.4">
      これでいく！ →
    </button>
  </div>

  <!-- ===== SCREEN 3: UPLOAD ===== -->
  <div class="screen" id="screen-upload">
    <button class="back-btn" onclick="goTo('trait')">← もどる</button>
    <div class="screen-header">
      <div class="screen-title">写真を<span>えらぼう</span></div>
    </div>

    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">写真をタップして選ぼう</div>
      <div class="upload-hint">端末から画像を選択できます</div>
      <img id="photo-preview" alt="プレビュー">
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handlePhotoUpload(this)">

    <div id="category-hint" style="display:none"></div>
  </div>

  <!-- ===== SCREEN 4: MONSTER ===== -->
  <div class="screen" id="screen-monster">
    <div class="monster-photo-wrap" id="monster-photo-wrap">
      <img id="monster-photo" src="" alt="">
    </div>
    <div class="monster-appear-text">⚡ モンスター出現！</div>
    <div class="monster-card">
      <span class="monster-emoji" id="monster-emoji"></span>
      <div class="monster-type" id="monster-type"></div>
      <div class="monster-name" id="monster-name"></div>
      <div class="monster-message" id="monster-message"></div>
    </div>
    <div class="spacer"></div>
  </div>

  <!-- ===== SCREEN 5: MISSIONS ===== -->
  <div class="screen" id="screen-missions">
    <div class="screen-header">
      <div class="screen-step">ミッション選択</div>
      <div class="screen-title">どれに<span>チャレンジ</span>する？</div>
    </div>

    <div class="mission-list" id="mission-list">
      <!-- JS生成 -->
    </div>

    <div class="mission-hint">1つ選んで「チャレンジ」ボタンを押してね</div>
    <button class="btn btn-success" id="mission-next-btn" onclick="goToAnswer()" disabled style="opacity:0.4">
      チャレンジ！ ⚔️
    </button>
  </div>

  <!-- ===== SCREEN 6: ANSWER (2ステート) ===== -->
  <div class="screen" id="screen-answer">

    <!-- ── State A: 回答中 ── -->
    <div id="answer-state">
      <button class="back-btn" id="answer-back-btn" onclick="goTo('missions')">← もどる</button>
      <div class="answer-mission-card" id="answer-mission-card"></div>
      <div class="answer-label">💬 こたえてみよう！</div>
      <div id="answer-ui"></div>
      <div class="mt-auto">
        <button class="btn btn-success" id="submit-btn" onclick="submitAnswer()">
          こたえを送る 🚀
        </button>
      </div>
    </div>

    <!-- ── State B: インラインフィードバック + 次の探究 ── -->
    <div id="inline-result" style="display:none">
      <div class="inline-confetti" id="inline-confetti"></div>

      <!-- フィードバック -->
      <div class="inline-feedback">
        <div class="inline-xp-bar-wrap">
          <div class="inline-xp-bar-fill" id="inline-xp-bar"></div>
        </div>
        <div class="inline-xp-badge">⭐ <span id="inline-xp-label">+30 XP</span></div>
        <span class="inline-monster-emoji" id="inline-monster-emoji"></span>
        <div class="inline-badge">モンスターからのメッセージ</div>
        <div class="inline-reaction" id="inline-reaction"></div>
        <div class="inline-sub" id="inline-sub"></div>
        <div class="inline-effect" id="inline-effect"></div>

      <div class="trivia-card" id="trivia-card" style="display:none">

          <span id="trivia-emoji" style="position:relative;z-index:1"></span>

          <div class="trivia-meta">
            <div class="trivia-header">💡 ちょこっと雑学！</div>

          <div class="trivia-text" id="trivia-text"></div>
          <button class="trivia-dive-btn" id="trivia-dive-btn" onclick="deepDiveTrivia()">🔍 この雑学を深掘りする！</button>
        </div>
      </div>

      <!-- 次の探究 -->
      <div class="next-header">
        <div class="next-header-title">🔍 次の探究を選ぼう</div>
        <div class="next-header-hint">横にスワイプして選べるよ →</div>
      </div>
      <div class="next-scroll-wrap">
        <div class="next-scroll" id="next-scroll"></div>
      </div>

      <!-- フッター -->
      <div class="inline-footer">
        <button class="btn btn-secondary" style="font-size:14px;padding:12px"

function goTo(screenId) {
  const fromIdx = SCREEN_ORDER.indexOf(currentScreen);
  const toIdx   = SCREEN_ORDER.indexOf(screenId);
  const goBack  = toIdx < fromIdx;

  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active','back-enter');
  });
  const next = document.getElementById('screen-' + screenId);
  if (goBack) next.classList.add('back-enter');
  next.classList.add('active');
  currentScreen = screenId;
}

// ---- Ripple helper ----
function addRipple(el, e) {
  const rect = el.getBoundingClientRect();
  const x = (e ? e.clientX : rect.left + rect.width/2)  - rect.left;
  const y = (e ? e.clientY : rect.top  + rect.height/2) - rect.top;
  const size = Math.max(rect.width, rect.height) * 1.5;
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
  el.style.position = 'relative';
  el.style.overflow = 'hidden';
  el.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

// カテゴリ同士の「相性」定義（key = 推定カテゴリ、value = 選択を許可するカテゴリ一覧）
const CAT_COMPATIBLE = {
  animal:  ['animal', 'mystery'],
  food:    ['food', 'mystery'],
  vehicle: ['vehicle', 'mystery'],
  plant:   ['plant', 'mystery'],
  mystery: ['animal', 'food', 'vehicle', 'plant', 'mystery'], // 不明なら何でもOK
};

const CAT_LABEL = {
  animal: '🐾 どうぶつ系',
  food:   '🍜 たべもの系',
  vehicle:'🚗 のりもの・建物系',
  plant:  '🌿 しぜん・植物系',
  mystery:'✨ ふしぎ系',
};

// Canvas で画像の色をピクセル分布で分析して推定カテゴリを返す
function analyzeImageCategory(imgEl) {
  try {
    const SIZE = 100;
    const cv  = document.createElement('canvas');
    cv.width  = SIZE; cv.height = SIZE;
    const ctx = cv.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, SIZE, SIZE);
    const d     = ctx.getImageData(0, 0, SIZE, SIZE).data;
    const total = SIZE * SIZE;

    // ---- ピクセルごとに種類を集計 ----
    let sumR=0, sumG=0, sumB=0;
    let warmPx=0, grayPx=0, greenPx=0, darkPx=0, whitePx=0, bluePx=0;

    for (let i = 0; i < d.length; i += 4) {
      const pr = d[i], pg = d[i+1], pb = d[i+2];
      sumR += pr; sumG += pg; sumB += pb;

      const lum = (pr + pg + pb) / 3;
      const mx  = Math.max(pr, pg, pb);
      const mn  = Math.min(pr, pg, pb);
      const sat = mx > 10 ? (mx - mn) / mx : 0;

      if (lum < 52)                                             darkPx++;  // 暗い
      if (lum > 195 && sat < 0.14)                             whitePx++; // 白・ほぼ白（皿など）
      if (sat < 0.14 && lum > 65)                              grayPx++;  // グレー（コンクリ・金属）
      if (pg > pr * 1.1 && pg > pb * 1.08 && sat > 0.12)      greenPx++; // 緑
      if (pb > pr * 1.1 && pb > pg * 1.05 && sat > 0.12)      bluePx++;  // 青（空・海）
      // 暖色: Rが最大かつG・Bより明確に高い（茶・橙・赤・黄 → パン・肉・果物）
      if (pr > pg + 14 && pr > pb + 18 && sat > 0.10)          warmPx++;
    }

    const avgR = sumR / total, avgG = sumG / total, avgB = sumB / total;
    const avgBright = (avgR + avgG + avgB) / 3;
    const avgMx  = Math.max(avgR, avgG, avgB);
    const avgMn  = Math.min(avgR, avgG, avgB);
    const avgSat = avgMx > 10 ? (avgMx - avgMn) / avgMx : 0;

    const warmRatio  = warmPx  / total;
    const grayRatio  = grayPx  / total;
    const greenRatio = greenPx / total;
    const darkRatio  = darkPx  / total;
    const whiteRatio = whitePx / total;
    const blueRatio  = bluePx  / total;

    // ---- 判定ロジック ----

    // 1) 全体が暗い → mystery
    if (avgBright < 48 || darkRatio > 0.58) return 'mystery';

    // 2) 緑が多い → plant（vehicle/foodより先に判定）
    if (greenRatio > 0.18) return 'plant';
    if (avgG > avgR * 1.12 && avgG > avgB * 1.08 && avgSat > 0.10) return 'plant';

    // 3) food 判定 — vehicleより先に！（白皿がgrayとして誤分類されるのを防ぐ）
    //    ・暖色ピクセルが12%超（茶・橙・赤 → パン/肉/果物/コーヒー）
    //    ・OR 白エリア（皿）があってRが平均最大
    //    ・OR 平均でRがG・Bより優位
    if (warmRatio > 0.12) return 'food';
    if (whiteRatio > 0.08 && avgR >= avgG - 3 && avgBright > 55) return 'food';
    if (avgR > avgG * 1.06 && avgR > avgB * 1.10 && avgBright > 58) return 'food';

    // 4) グレー多＋低彩度＋暖色少 → vehicle（コンクリート・建物）
    if (grayRatio > 0.40 && avgSat < 0.18 && warmRatio < 0.08) return 'vehicle';

    // 5) 青が多い → vehicle（空・海）
    if (blueRatio > 0.20 || (avgB > avgR * 1.10 && avgB > avgG)) return 'vehicle';

    // 6) それ以外 → animal
    return 'animal';

  } catch(e) {
    return 'mystery';
  }
}

function handlePhotoUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    state.photoUrl = e.target.result;
    state.suggestedCategory = null;
    state.category = null;

    const preview = document.getElementById('photo-preview');
    preview.src = state.photoUrl;
    preview.style.display = 'block';

    const area = document.getElementById('upload-area');
    area.classList.add('has-image');
    area.querySelector('.upload-icon').style.display = 'none';
    area.querySelector('.upload-text').style.display = 'none';
    area.querySelector('.upload-hint').style.display = 'none';

    // 画像ロード後に自動カテゴリ判定 → 即モンスター生成
    preview.onload = () => {
      const detected = analyzeImageCategory(preview);
      state.suggestedCategory = detected;
      state.category = detected;
      // モンスター演出 → 2.4秒後に自動でミッションへ
      goToMonster();
      setTimeout(() => buildMissions(), 2400);
    };
  };
  reader.readAsDataURL(file);
}

function selectCategory(cat, el) {
  const suggested = state.suggestedCategory;
  const allowed   = suggested ? CAT_COMPATIBLE[suggested] : null;

  // エラーをいったんリセット
  document.querySelectorAll('#category-chips .cat-card')
    .forEach(c => c.classList.remove('selected','error-chip'));
  document.getElementById('category-error').style.display = 'none';

  // ミスマッチ判定（mystery推定・または選択がmysteryなら無条件OK）
  if (allowed && !allowed.includes(cat)) {
    // エラー演出
    el.classList.add('error-chip');
    void el.offsetWidth; // アニメーションリセット
    el.classList.add('error-chip');

    const errEl = document.getElementById('category-error');
    errEl.innerHTML = `
      ⚠️ この写真は <strong>${CAT_LABEL[suggested]}</strong> に見えます。<br>
      「${CAT_LABEL[cat]}」は合わなそう…もう一度選んでみよう！<br>
      <span style="font-size:11px;opacity:0.7">※ どうしてもそのカテゴリにしたい場合は「✨ その他」を選んでね</span>
    `;

    updateUploadNextBtn();

  }

  // OK
  state.category = cat;
  el.classList.add('selected');
  updateUploadNextBtn();
}

function buildMissions() {
  const cat   = state.category || 'mystery';
  const trait = state.trait    || 'short_attention';
  const base  = (MISSIONS[cat] && MISSIONS[cat][trait]) || MISSIONS.mystery.short_attention;
  const extra = EXTRA_MISSIONS[trait];

  // Pool = base 3 + extra 1 → random shuffle → pick 3
  const pool = [...base, extra];
  // Fisher-Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  state.missions = pool.slice(0, 3);
  state.selectedMissionIdx = null;

  const list = document.getElementById('mission-list');
  list.innerHTML = state.missions.map((m, i) => `
    <div class="mission-card ${LEVEL_CLASS[m.level]}" id="mission-card-${i}" onclick="selectMission(${i}, this, event)">
      <div class="mission-card-top">
        <span class="mission-level-badge">${LEVEL_LABELS[m.level]}</span>
        <span class="mission-type-icon">${ANSWER_TYPE_ICON[m.answerType] || '✏️'}</span>
      </div>
      <div class="mission-title">${m.title}</div>
      <div class="mission-body">${m.body}</div>
    </div>
  `).join('');

  const btn = document.getElementById('mission-next-btn');
  btn.disabled = true;
  btn.style.opacity = '0.4';
  goTo('missions');
}

// ---- visual choice helpers ----
function parseChoiceVisual(text) {
  const t = text.trim();
  // Leading emoji (Extended_Pictographic at start, followed by space + text)
  let m = t.match(/^(\p{Extended_Pictographic}(?:\uFE0F)?(?:\u20E3)?)\s+([\s\S]+)$/u);
  if (m) return { icon: m[1], label: m[2].trim() };
  // Trailing emoji
  m = t.match(/^([\s\S]+?)\s*(\p{Extended_Pictographic}(?:\uFE0F)?)$/u);
  if (m && m[1].trim()) return { icon: m[2], label: m[1].trim() };
  return { icon: null, label: t };
}

function vcbHTML(text, clickFn) {
  const { icon, label } = parseChoiceVisual(text);
  const safe = text.replace(/"/g, '&quot;');
  const inner = icon
    ? `<span class="vcb-icon">${icon}</span><span class="vcb-label">${label}</span>`
    : `<span class="vcb-text-only">${label}</span>`;
  return `<button class="vcb" onclick="${clickFn}(this,event)" data-value="${safe}">${inner}</button>`;
}

function renderAnswerUI(m) {
  const ui = document.getElementById('answer-ui');
  const trait = state.trait;

  switch (m.answerType) {
    case 'rating': {
      const labels = m.ratingLabels || ['','','','',''];
      ui.innerHTML = `
        <div class="star-rating" id="star-rating">
          ${[1,2,3,4,5].map(n => `<button class="star-btn" onclick="selectStar(${n})">⭐</button>`).join('')}
        </div>
        <div class="star-label" id="star-label">⬆ タップして評価しよう</div>
      `;
      ui.dataset.ratingLabels = JSON.stringify(labels);
      setSubmitBtn(false);
      break;
    }
    case 'choose+why':
      ui.innerHTML = `
        <div class="visual-choices col2" id="why-choices">
          ${m.choices.map(c => vcbHTML(c, 'selectChoiceForWhy')).join('')}
        </div>
        <div class="why-section" id="why-section" style="display:none">
          <hr class="why-divider">
          <div class="why-label">💬 なぜそう思った？</div>
          <textarea class="answer-textarea" id="answer-text"
            placeholder="なぜそう思った？なんでも書いてOKだよ！" oninput="checkAnswerReady()"></textarea>
          <div class="char-counter warn" id="char-counter">なにか書いてみよう！</div>
        </div>
      `;
      setSubmitBtn(false);
      break;
    case 'choices': {
      const cols = m.choices.length <= 2 ? ' col2' : '';
      ui.innerHTML = `<div class="visual-choices${cols}">
        ${m.choices.map(c => vcbHTML(c, 'selectChoice')).join('')}
      </div>`;
      setSubmitBtn(false);
      break;
    }
    case 'text':
    default:
      if (trait === 'audio_preferred') {
        ui.innerHTML = `
          <div class="audio-ui">
            <button class="mic-btn" onclick="this.textContent='⏹️';this.style.background='linear-gradient(135deg,#38ef7d,#11998e)'">🎤</button>
            <div class="mic-hint">マイクボタンを押して声で答えよう</div>
            <div style="color:rgba(255,255,255,0.4);font-size:11px">または下に文字で入力</div>
          </div>
          <textarea class="answer-textarea" id="answer-text"
            placeholder="こたえを入力…（10文字以上）" oninput="checkAnswerReady()"></textarea>
          <div class="char-counter warn" id="char-counter">0 / 10文字</div>
        `;
      } else {
        ui.innerHTML = `
          <textarea class="answer-textarea" id="answer-text"
            placeholder="なんでもいいから書いてみよう！どんな答えでもOKだよ🙆" oninput="checkAnswerReady()"></textarea>
          <div class="char-counter warn" id="char-counter">なんでもいいから書いてみよう！</div>
        `;
      }
      setSubmitBtn(false);
  }
}

// ---- char counter / ready check ----
function checkAnswerReady() {
  const ta = document.getElementById('answer-text');
  if (!ta) return;
  const len = ta.value.trim().length;
  const counter = document.getElementById('char-counter');
  const m = state.missions[state.selectedMissionIdx];
  const isTextOnly = m && m.answerType === 'text';

  if (counter) {
    if (len >= BONUS_TEXT_LEN) {
      counter.textContent = `${len}文字 ✨ くわしい！`;
      counter.className = 'char-counter bonus';
    } else if (len >= 1) {
      counter.textContent = isTextOnly ? `${len}文字 ✓ 送れるよ！` : `${len}文字 ✓`;
      counter.className = 'char-counter ok';
    } else {
      counter.textContent = isTextOnly ? 'なんでもいいから書いてみよう！' : 'なにか書いてみよう！';
      counter.className = 'char-counter warn';
    }
  }

  if (m && m.answerType === 'choose+why') {
    // choose+why は理由テキスト1文字以上 + 選択済みの両方必要
    setSubmitBtn(len >= 1 && !!state.answer);
  } else if (isTextOnly) {
    // 記述式は1文字以上でOK
    setSubmitBtn(len >= 1);
  } else {
    setSubmitBtn(len >= MIN_TEXT_LEN);
  }
}

// ---- validate ----
function validateAnswer() {
  const m = state.missions[state.selectedMissionIdx];
  if (!m) return { valid: true, bonus: false };

  if (m.answerType === 'choices') {
    return { valid: !!state.answer, bonus: false, reason: '選択肢を選んでみよう！' };
  }
  if (m.answerType === 'rating') {
    return { valid: state.selectedStars > 0, bonus: state.selectedStars >= 4, reason: '星をタップして評価しよう！' };
  }

  const ta = document.getElementById('answer-text');
  const text = ta ? ta.value.trim() : '';

  if (m.answerType === 'choose+why') {
    if (!state.answer) return { valid: false, reason: 'まず選択肢を選んでみよう！' };
    if (text.length < 1) return { valid: false, reason: 'なぜそう思ったか書いてみよう！' };
  } else {
    // 記述式はどんな回答でも正解 — 1文字あれば送れる
    if (text.length < 1) return { valid: false, reason: 'なにか書いてみよう！' };
  }

  const bonus = text.length >= BONUS_TEXT_LEN;
  return { valid: true, bonus };
}

// ---- retry overlay ----
function showRetry(reason) {
  state.answerAttempts++;
  const remaining = MAX_ATTEMPTS - state.answerAttempts;
  const titles    = ['もうちょっとだけ！', 'いい感じ！もう少し！', 'あと一歩！'];
  const idx       = Math.min(state.answerAttempts - 1, titles.length - 1);

  document.getElementById('retry-monster-emoji').textContent = state.monster?.emoji || '🤔';
  document.getElementById('retry-title').textContent = titles[idx];
  document.getElementById('retry-msg').textContent   = reason;

  const attEl = document.getElementById('retry-attempts');
  if (remaining <= 0) {
    attEl.textContent = '短くてもいいから自分の言葉で書いてみよう！';
    attEl.className = 'retry-attempts danger';
  } else {
    attEl.textContent = `あと${remaining}回チャレンジできるよ`;
    attEl.className = 'retry-attempts';
  }

  // Reset wiggle animation
  const emojiEl = document.getElementById('retry-monster-emoji');
  emojiEl.style.animation = 'none';
  void emojiEl.offsetWidth;
  emojiEl.style.animation = '';

  document.getElementById('retry-overlay').style.display = 'flex';
}

function closeRetry() {
  document.getElementById('retry-overlay').style.display = 'none';
  setTimeout(() => document.getElementById('answer-text')?.focus(), 100);
}

// ============================
// SUBMIT → インラインフィードバック
// ============================
function submitAnswer() {
  const v = validateAnswer();
  if (!v.valid && state.answerAttempts < MAX_ATTEMPTS) {
    showRetry(v.reason || 'もう少し考えてみよう！');
    return;
  }

  const baseXP = [30, 50, 80][state.missions[state.selectedMissionIdx].level - 1];
  const gained = baseXP + (v.bonus ? 20 : 0);
  state.answeredMissions.add(state.selectedMissionIdx);
  state.prevXp = state.xp;
  state.xp += gained;

  showInlineResult(v, gained);
}

function showInlineResult(v, gained) {
  // State切替
  document.getElementById('answer-state').style.display = 'none';
  const ir = document.getElementById('inline-result');
  ir.style.display = 'flex';
  ir.style.flexDirection = 'column';

  // XP表示
  document.getElementById('inline-xp-label').textContent = `+${gained} XP ゲット！`;

  const me = document.getElementById('inline-monster-emoji');
  me.textContent = state.monster?.emoji || '🌟';
  me.style.animation = 'none'; void me.offsetWidth; me.style.animation = '';

  // ---- 回答スニペットを取得 ----
  const ta = document.getElementById('answer-text');
  let answerSnippet = (ta && ta.value.trim()) || state.answer || '…';
  if (answerSnippet.length > 18) answerSnippet = answerSnippet.slice(0, 18) + '…';

  // ---- モンスターの個性でリアクション ----
  const cat = state.category || 'mystery';
  const pool = MONSTER_COMMENTS[cat] || MONSTER_COMMENTS.mystery;
  const commentFn = pool[Math.floor(Math.random() * pool.length)];
  const [reaction, sub] = commentFn(answerSnippet);

  if (v.bonus) {
    // ボーナス時：回答に驚きつつボーナスも伝える
    document.getElementById('inline-reaction').textContent = `「${answerSnippet}」…そこまで書いてくれたの！？`;
    document.getElementById('inline-sub').textContent = `くわしく考えてくれてありがとう！${sub}`;
    document.getElementById('inline-effect').textContent = `⭐ くわしいボーナス！+${gained} XP（+20UP）`;
  } else {
    document.getElementById('inline-reaction').textContent = reaction;
    document.getElementById('inline-sub').textContent = sub;
    document.getElementById('inline-effect').textContent = `+${gained} XP ゲット！`;
  }

  // XP バー
  const pct = Math.min(state.xp / 300 * 100, 100);
  setTimeout(() => { document.getElementById('inline-xp-bar').style.width = pct + '%'; }, 200);

  // XP カウントアップ
  setTimeout(() => animateXP(state.prevXp, state.xp, 900), 300);

  // 雑学カード
  showTrivia();

  // 関連ミッション生成
  buildRelatedMissions();

  // エフェクト
  setTimeout(() => { spawnConfetti(); spawnBurst(); }, 150);

  // 上にスクロール
  ir.scrollTop = 0;
}

// ============================
// 雑学表示
// ============================
function showTrivia() {
  const cat   = state.category || 'mystery';
  const level = state.missions[state.selectedMissionIdx]?.level || 1;

  const pool    = (TRIVIA[cat] || TRIVIA.mystery);
  const matched = pool.filter(t => t.level === level);
  const items   = matched.length > 0 ? matched : pool;
  const item    = items[Math.floor(Math.random() * items.length)];
  state._currentTrivia = { ...item, category: cat };

  // Visual header background
  const visual = document.getElementById('trivia-visual');
  visual.style.background = TRIVIA_CAT_BG[cat] || TRIVIA_CAT_BG.mystery;

  document.getElementById('trivia-emoji').textContent = item.emoji;
  document.getElementById('trivia-text').textContent  = item.fact;

  // Save button state
  const saved = isTriviaAlreadySaved(item);
  const saveBtn = document.getElementById('trivia-save-btn');
  saveBtn.textContent = saved ? '⭐ 保存済み' : '⭐ 保存';
  saveBtn.className   = 'trivia-save-btn' + (saved ? ' saved' : '');

  document.getElementById('trivia-card').style.display = 'block';
}

// ============================
// 雑学フォルダ（localStorage）
// ============================
const STORAGE_KEY = 'tomori_saved_trivia';

function getSavedTrivia() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function isTriviaAlreadySaved(item) {
  return getSavedTrivia().some(s => s.fact === item.fact);
}

function toggleSaveTrivia() {
  const item = state._currentTrivia;
  if (!item) return;
  const list = getSavedTrivia();
  const idx  = list.findIndex(s => s.fact === item.fact);
  const saveBtn = document.getElementById('trivia-save-btn');

  if (idx >= 0) {
    list.splice(idx, 1);
    saveBtn.textContent = '⭐ 保存';
    saveBtn.className   = 'trivia-save-btn';
  } else {
    list.unshift({ emoji: item.emoji, fact: item.fact, category: item.category, level: item.level, savedAt: Date.now() });
    saveBtn.textContent = '⭐ 保存済み';
    saveBtn.className   = 'trivia-save-btn saved';
    // プチアニメ
    saveBtn.style.transform = 'scale(1.15)';
    setTimeout(() => { saveBtn.style.transform = ''; }, 200);
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  updateFolderBtn();
}

function updateFolderBtn() {
  const list  = getSavedTrivia();
  const btn   = document.getElementById('folder-btn');
  const badge = document.getElementById('folder-count-badge');
  if (!btn) return;
  if (list.length > 0) {
    btn.style.display = '';
    if (badge) badge.textContent = `(${list.length}件)`;
  } else {
    btn.style.display = 'none';
  }
}

function buildFolderScreen() {
  const list    = getSavedTrivia();
  const content = document.getElementById('folder-content');
  const empty   = document.getElementById('folder-empty');

  if (list.length === 0) {
    content.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  content.innerHTML = `
    <div class="folder-list">
      ${list.map((item, i) => `
        <div class="folder-item">
          <div class="folder-item-visual" style="background:${TRIVIA_CAT_BG[item.category] || TRIVIA_CAT_BG.mystery}">
            <span style="position:relative;z-index:1;font-size:52px">${item.emoji}</span>
          </div>
          <div class="folder-item-body">
            <div class="folder-item-text">${item.fact}</div>
            <button class="folder-item-del" onclick="removeSavedTrivia(${i})" title="削除">×</button>
          </div>
        </div>
      `).join('')}
    </div>
    <button class="folder-clear-btn" onclick="clearAllSaved()">🗑️ すべて削除</button>
  `;
}

function removeSavedTrivia(idx) {
  const list = getSavedTrivia();
  list.splice(idx, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  buildFolderScreen();
  updateFolderBtn();
}

function clearAllSaved() {
  if (!confirm('保存した雑学をすべて削除しますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  buildFolderScreen();
  updateFolderBtn();
}

function deepDiveTrivia() {
  const item = state._currentTrivia;
  if (!item) return;

  // 雑学テキストからキーワード抽出
  const keywords = item.fact
    .replace(/[、。！？…\s]/g, ' ')
    .split(' ')
    .map(w => w.trim())
    .filter(w => w.length >= 2);

  // キーワードでミッション検索
  const cat  = state.category || 'mystery';
  const pool = [];
  Object.keys(MISSIONS[cat] || {}).forEach(t => {
    (MISSIONS[cat][t] || []).forEach(m => pool.push({...m}));
  });
  Object.values(EXTRA_MISSIONS).forEach(m => pool.push({...m}));

  // 現在のミッションを除外
  const currentTitle = state.missions[state.selectedMissionIdx]?.title;
  const filtered = pool.filter(m => m.title !== currentTitle);

  // スコアリング
  filtered.forEach(m => {
    const hay = m.title + m.body;
    m._score = keywords.filter(k => hay.includes(k)).length;
    m._sort  = m._score * 10 + Math.random() * 5;
  });
  filtered.sort((a, b) => b._sort - a._sort);

  // 上位ミッションを1つ選んで回答画面へ
  const picked = filtered[0];
  if (!picked) return;

  // missionsリストに追加してそのまま回答画面へ
  state.missions.push(picked);
  state.selectedMissionIdx = state.missions.length - 1;
  goTo('answer');
  document.getElementById('answer-state').style.display = 'flex';
  document.getElementById('answer-state').style.flexDirection = 'column';
  document.getElementById('inline-result').style.display = 'none';
  state.answerAttempts = 0;
  state.answer = null;
  state.selectedStars = 0;
  const m2 = state.missions[state.selectedMissionIdx];
  const card = document.getElementById('answer-mission-card');
  card.innerHTML = `
    <div class="answer-mission-level">${LEVEL_LABELS[m2.level]}</div>
    <div class="answer-mission-title">${m2.title}</div>
    <div class="answer-mission-body">${m2.body}</div>
  `;
  renderAnswerUI(m2);
  setSubmitBtn(false);
  document.getElementById('answer-back-btn').onclick = () => goTo('missions');
}

// ============================
// 関連ミッション生成
// ============================
const ANSWER_TYPE_ICON = {
  text: '✏️', choices: '👆', 'choose+why': '💬', rating: '⭐',
};

function generateRelatedMissions() {
  const cat   = state.category || 'mystery';
  const currentTitle = state.missions[state.selectedMissionIdx]?.title;
  const pool  = [];

  // 全トレイトのミッションを収集
  Object.keys(MISSIONS[cat] || {}).forEach(t => {
    (MISSIONS[cat][t] || []).forEach(m => pool.push({...m}));
  });
  // EXTRAも追加
  Object.values(EXTRA_MISSIONS).forEach(m => pool.push({...m}));

  // 現在のミッションを除外
  const filtered = pool.filter(m => m.title !== currentTitle);

  // 回答テキストからキーワード抽出してスコアリング
  const answerEl = document.getElementById('answer-text');
  const answerText = (answerEl ? answerEl.value : '') || (state.answer || '');
  const keywords = answerText
    .replace(/[、。！？…\s]/g, ' ')
    .split(' ')
    .map(w => w.trim())
    .filter(w => w.length >= 2);

  filtered.forEach(m => {
    const haystack = m.title + m.body;
    const matchCount = keywords.filter(kw => haystack.includes(kw)).length;
    // キーワードマッチ数×10 + ランダム成分（多様性確保）
    m._sort = matchCount * 10 + Math.random() * 5;
  });

  // スコア降順でソート
  filtered.sort((a, b) => b._sort - a._sort);
  return filtered.slice(0, 4);
}

function buildRelatedMissions() {
  const missions = generateRelatedMissions();
  const scroll   = document.getElementById('next-scroll');
  scroll.innerHTML = missions.map((m, i) => `
    <div class="next-card ${LEVEL_CLASS[m.level]}" onclick="selectRelatedMission(${i})"
         id="related-card-${i}">
      <div class="next-card-header">
        <span class="next-card-level">${LEVEL_LABELS[m.level]}</span>
        <span class="next-card-type">${ANSWER_TYPE_ICON[m.answerType] || '✏️'}</span>
      </div>
      <div class="next-card-title">${m.title}</div>
      <div class="next-card-body">${m.body}</div>
      <div class="next-card-cta">やってみる →</div>
    </div>
  `).join('');
  // missionsをstateに保存
  state.relatedMissions = missions;
}

function selectRelatedMission(idx) {
  const m = state.relatedMissions[idx];
  if (!m) return;

  // リップル
  addRipple(document.getElementById('related-card-' + idx));

  // State A に戻す
  setTimeout(() => {
    state.answerAttempts = 0;
    state.answer = null;
    state.selectedStars = 0;

    // missionsに新しいミッションをセット
    state.missions = [m];
    state.selectedMissionIdx = 0;

    // UIを更新
    document.getElementById('answer-mission-card').innerHTML = `
      <div class="answer-mission-level">${LEVEL_LABELS[m.level]}</div>
      <div class="answer-mission-title">${m.title}</div>
      <div class="answer-mission-body">${m.body}</div>
    `;
    renderAnswerUI(m);

    // StateB→A 切替
    document.getElementById('trivia-card').style.display = 'none';
    document.getElementById('inline-result').style.display = 'none';
    const as = document.getElementById('answer-state');
    as.style.display = 'flex';
    as.style.flexDirection = 'column';
    // 戻るボタンはインライン結果へ
    document.getElementById('answer-back-btn').onclick = () => {
      as.style.display = 'none';
      document.getElementById('inline-result').style.display = 'flex';
      document.getElementById('inline-result').style.flexDirection = 'column';
    };
  }, 120);
}

// XP count-up（inline-xp-labelを使う）
function animateXP(from, to, duration) {
  const el = document.getElementById('inline-xp-label');
  if (!el) return;
  const start = performance.now();
  const tick = (now) => {
    const t   = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const cur  = Math.round(from + (to - from) * ease);
    el.textContent = `合計 ${cur} XP`;
    if (t < 1) requestAnimationFrame(tick);
    else el.innerHTML = `合計 <span class="xp-pop">${to} XP</span>`;
  };
  requestAnimationFrame(tick);
}

// Burst（inline-confettiコンテナを使う）
function spawnBurst() {
  const wrap   = document.getElementById('inline-confetti');
  if (!wrap) return;
  const colors = ['#ffd200','#f953c6','#38ef7d','#00b4d8','#ff6b6b'];
  for (let i = 0; i < 20; i++) {
    const el    = document.createElement('div');
    el.className = 'burst-piece';
    const angle = (i / 20) * 360;
    const dist  = 80 + Math.random() * 100;
    const rad   = angle * Math.PI / 180;
    el.style.setProperty('--tx', `${Math.cos(rad) * dist}px`);
    el.style.setProperty('--ty', `${Math.sin(rad) * dist}px`);
    el.style.background = colors[i % colors.length];
    el.style.animationDuration = (0.4 + Math.random() * 0.35) + 's';
    el.style.width = el.style.height = (6 + Math.random() * 8) + 'px';
    wrap.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#ffd200','#f953c6','#38ef7d','#00b4d8','#ff6b6b','#ffd166','#a78bfa','#fb923c'];
  const shapes = ['rect','circle','star'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size  = 6 + Math.random() * 8;
    el.style.left   = Math.random() * 100 + '%';
    el.style.background = color;
    el.style.animationDuration = (1.4 + Math.random() * 2.2) + 's';
    el.style.animationDelay    = (Math.random() * 1.0) + 's';
    el.style.width  = size + 'px';
    el.style.height = (shape === 'circle' ? size : size * (0.5 + Math.random())) + 'px';
    el.style.borderRadius = shape === 'circle' ? '50%' : shape === 'star' ? '2px' : '1px';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    if (shape === 'star') {
      el.style.clipPath = 'polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)';
    }
    wrap.appendChild(el);
  }
}

function nextMission() {
  buildMissions();
}

// ============================
// INIT
// ============================
function init() {
  // Stars on top screen
  const container = document.getElementById('stars-container');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    container.appendChild(s);
  }
  buildTraitList();
  updateFolderBtn();
}

init();
