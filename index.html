<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tomori 冒険探究 v4</title>
<style>
:root {
  --cyan:#00d4ff; --cyan-dim:rgba(0,212,255,0.15); --cyan-glow:rgba(0,212,255,0.5);
  --purple:#9b5dff; --purple-dim:rgba(155,93,255,0.15);
  --green:#00ff88; --gold:#ffd700; --orange:#ff8c00;
  --bg0:#02060f; --bg1:#040b18; --bg2:#071020;
  --text:#d0eeff; --text-dim:rgba(208,238,255,0.45);
  --border:rgba(0,212,255,0.22);
  --glow-sm:0 0 6px rgba(0,212,255,0.5);
  --glow-md:0 0 14px rgba(0,212,255,0.45),0 0 30px rgba(0,212,255,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic Pro','Hiragino Sans','Meiryo',sans-serif;
  background:var(--bg0);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.015) 2px,rgba(0,212,255,0.015) 4px);
  pointer-events:none;z-index:9999}
#app{width:100%;max-width:420px;min-height:100vh;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(0,80,160,0.2) 0%,transparent 70%),
  linear-gradient(180deg,var(--bg1) 0%,var(--bg0) 100%)}
#app::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,0.035) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,0.035) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0}
.screen{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;
  animation:screenIn .28s cubic-bezier(.22,1,.36,1)}
.screen.active{display:flex}
@keyframes screenIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes cardIn{from{opacity:0;transform:scale(.85) translateY(12px)}to{opacity:1;transform:none}}
@keyframes confettiFall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes depthFill{from{width:0}to{width:var(--target-w)}}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:4px;
  font-size:16px;font-weight:900;cursor:pointer;letter-spacing:.1em;
  position:relative;overflow:hidden;font-family:inherit;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:transform .1s,box-shadow .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#0095cc,#00d4ff,#00aadd);color:#000d1a;
  box-shadow:0 0 18px rgba(0,212,255,.6),0 0 40px rgba(0,212,255,.2)}
.btn-success{background:linear-gradient(135deg,#006644,#00ff88,#00cc6a);color:#001a0d;
  box-shadow:0 0 18px rgba(0,255,136,.55)}
.btn-ghost{background:rgba(0,212,255,.06);color:var(--cyan);border:1px solid var(--border)}
.btn+.btn{margin-top:12px}

/* ── SCREEN 1: TOP ── */
#screen-top{align-items:center;justify-content:center;gap:0;
  padding:48px 24px 40px;text-align:center;overflow:hidden}
.top-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:2.5px;height:2.5px;background:#fff;border-radius:50%;
  animation:twinkle 2s ease-in-out infinite}
.top-logo-wrap{position:relative;display:flex;align-items:center;justify-content:center;
  width:110px;height:110px;margin-bottom:12px}
.top-logo-ring{position:absolute;inset:0;border:1.5px solid transparent;
  border-top-color:var(--cyan);border-right-color:var(--cyan);border-radius:50%;
  animation:spin 3s linear infinite;box-shadow:var(--glow-sm)}
.top-logo-ring2{position:absolute;inset:10px;border:1px solid transparent;
  border-bottom-color:var(--purple);border-left-color:var(--purple);border-radius:50%;
  animation:spin 2s linear infinite reverse}
.top-logo{font-size:56px;position:relative;z-index:1;
  animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 14px var(--cyan-glow))}
.top-title{font-size:32px;font-weight:900;color:var(--cyan);
  text-shadow:0 0 20px var(--cyan-glow),0 0 40px rgba(0,212,255,.3);
  letter-spacing:.24em;margin-bottom:6px}
.top-tagline{font-size:13px;color:var(--text-dim);line-height:1.9;
  margin-bottom:44px;letter-spacing:.04em}
.top-tagline b{color:var(--text);font-weight:900}
.top-cta{width:100%}

/* ── SCREEN 2: SETUP ── */
#screen-setup{padding:0;overflow-y:auto}
.setup-header{padding:28px 20px 16px}
.setup-step{font-size:10px;letter-spacing:.2em;color:var(--cyan);
  text-transform:uppercase;margin-bottom:8px}
.setup-title{font-size:22px;font-weight:900;color:var(--text);line-height:1.3}
.setup-sub{font-size:13px;color:var(--text-dim);margin-top:6px}
.explorer-list{display:flex;flex-direction:column;gap:10px;padding:0 20px 20px}
.exp-card{display:flex;align-items:center;gap:16px;padding:16px 18px;
  border:1px solid var(--border);background:rgba(0,212,255,.04);cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  transition:all .2s;position:relative}
.exp-card.sel{border-color:var(--cyan);background:rgba(0,212,255,.1);box-shadow:var(--glow-md)}
.exp-card:active{transform:scale(.98)}
.exp-icon{font-size:38px;line-height:1;flex-shrink:0}
.exp-text{flex:1}
.exp-name{font-size:17px;font-weight:900;color:var(--text);letter-spacing:.04em}
.exp-desc{font-size:12px;color:var(--text-dim);margin-top:3px}
.exp-tick{font-size:18px;color:var(--cyan);opacity:0;transition:opacity .2s;margin-left:auto}
.exp-card.sel .exp-tick{opacity:1}

.mood-section{padding:20px 20px 0;border-top:1px solid var(--border);display:none}
.mood-section.on{display:block}
.mood-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;letter-spacing:.04em}
.mood-row{display:flex;gap:10px}
.mood-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:18px 6px;border:1px solid var(--border);background:rgba(0,212,255,.03);
  cursor:pointer;border-radius:8px;transition:all .2s}
.mood-card.sel{border-color:var(--cyan);background:rgba(0,212,255,.1);box-shadow:var(--glow-sm)}
.mood-card:active{transform:scale(.96)}
.mood-em{font-size:32px}
.mood-lbl{font-size:11px;font-weight:700;color:var(--text-dim);text-align:center;line-height:1.4}
.mood-card.sel .mood-lbl{color:var(--cyan)}
.setup-btn-area{padding:20px}

/* ── SCREEN 3: PHOTO ── */
#screen-photo{padding:24px 20px 32px;align-items:center}
.photo-hdr{width:100%;text-align:center;margin-bottom:10px}
.photo-hdr-title{font-size:20px;font-weight:900;color:var(--text)}
.photo-hdr-sub{font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:.06em}
.camera-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.cam-ring{position:relative;display:flex;align-items:center;justify-content:center}
.cam-ring::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;
  border:1px solid transparent;border-top-color:var(--cyan);border-right-color:var(--cyan);
  animation:spin 4s linear infinite;box-shadow:0 0 8px var(--cyan-glow)}
.cam-ring::after{content:'';position:absolute;width:224px;height:224px;border-radius:50%;
  border:1px solid transparent;border-bottom-color:var(--purple);border-left-color:var(--purple);
  animation:spin 6s linear infinite reverse}
.cam-btn{width:152px;height:152px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(0,180,255,.35),rgba(0,50,100,.9) 70%);
  display:flex;align-items:center;justify-content:center;font-size:64px;cursor:pointer;
  box-shadow:0 0 30px rgba(0,212,255,.35),inset 0 0 20px rgba(0,212,255,.15);
  transition:transform .18s;position:relative;z-index:1}
.cam-btn:active{transform:scale(.94)}
.cam-label{font-size:18px;font-weight:900;color:var(--text);letter-spacing:.08em}
.cam-sub{font-size:12px;color:var(--text-dim);margin-top:-12px}
.cam-alt{font-size:13px;color:var(--cyan);cursor:pointer;text-decoration:underline}
.preview-state{display:none;flex-direction:column;align-items:center;gap:16px;width:100%}
.preview-wrap{width:100%;max-width:320px;aspect-ratio:4/3;border-radius:8px;overflow:hidden;
  border:1.5px solid var(--cyan);box-shadow:var(--glow-md);cursor:pointer;position:relative}
.preview-wrap img{width:100%;height:100%;object-fit:cover}
.preview-change{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);
  color:var(--cyan);font-size:11px;padding:4px 8px;border-radius:4px;letter-spacing:.06em}
.photo-btn-area{width:100%;padding-top:24px}

/* ── SCREEN 4: MAP ── */
#screen-map{padding:0;overflow-y:auto;min-height:100vh}
.map-hud{display:flex;align-items:center;gap:8px;padding:11px 14px 9px;
  background:rgba(4,11,24,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.hud-depth-label{font-size:9px;letter-spacing:.15em;color:var(--text-dim);
  text-transform:uppercase;white-space:nowrap}
.hud-track{flex:1;height:6px;background:rgba(0,212,255,.1);border-radius:3px;overflow:hidden}
.hud-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));
  border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1);box-shadow:0 0 8px var(--cyan-glow)}
.hud-xp{font-size:13px;font-weight:900;color:var(--gold);white-space:nowrap;
  text-shadow:0 0 8px rgba(255,215,0,.6);letter-spacing:.04em}
.hud-thumb{width:32px;height:32px;border-radius:4px;overflow:hidden;
  border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.hud-thumb img{width:100%;height:100%;object-fit:cover}

.map-photo-hero{position:relative;width:100%;max-height:54vw;overflow:hidden}
.map-photo-hero img{width:100%;height:100%;object-fit:cover;display:block}
.map-photo-overlay{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(2,6,15,.85) 100%)}
.map-photo-cat{position:absolute;top:12px;left:12px;
  background:rgba(0,0,0,.65);border:1px solid var(--border);
  color:var(--text-dim);font-size:11px;padding:4px 10px;border-radius:20px;
  letter-spacing:.08em;backdrop-filter:blur(4px)}
.map-photo-chg{position:absolute;bottom:12px;right:12px;
  background:rgba(0,0,0,.7);border:1px solid var(--border);
  color:var(--cyan);font-size:12px;padding:6px 12px;border-radius:20px;
  cursor:pointer;letter-spacing:.06em;backdrop-filter:blur(4px);
  display:flex;align-items:center;gap:5px}
.map-photo-chg:active{transform:scale(.95)}

.map-sec-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.map-sec-title{font-size:13px;font-weight:900;color:var(--text);
  letter-spacing:.1em;text-transform:uppercase}
.map-sec-sub{font-size:11px;color:var(--text-dim)}

.mission-feed{display:flex;gap:12px;padding:4px 16px 24px;
  overflow-x:auto;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.mission-feed::-webkit-scrollbar{display:none}

/* QUEST CARD */
.qcard{flex:0 0 158px;height:248px;scroll-snap-align:start;
  display:flex;flex-direction:column;cursor:pointer;
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  overflow:hidden;transition:transform .2s,box-shadow .2s;
  position:relative;background:var(--bg2)}
.qcard:active{transform:scale(.96)}
.qcard.new{animation:cardIn .35s cubic-bezier(.22,1,.36,1) both}
.qcard-vis{height:58%;position:relative;display:flex;align-items:center;
  justify-content:center;overflow:hidden}
.qcard-vis::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(transparent,rgba(0,0,0,.5))}
.qcard-em{font-size:52px;line-height:1;position:relative;z-index:1;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.qcard-info{flex:1;padding:10px 12px 8px;display:flex;flex-direction:column;gap:5px;
  background:rgba(4,11,24,.85)}
.qcard-badge{font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:900;
  padding:2px 7px;border-radius:3px;width:fit-content;display:inline-block}
.qcard-title{font-size:15px;font-weight:900;color:var(--text);line-height:1.3;flex:1}
.qcard-meta{display:flex;align-items:center;justify-content:space-between}
.qcard-stars{font-size:11px;color:var(--gold);letter-spacing:-2px}
.qcard-xp{font-size:11px;font-weight:900;color:var(--green)}

/* Quest type themes */
.qt-discover .qcard-vis{background:linear-gradient(145deg,#92400e,#d97706,#fde68a)}
.qt-discover .qcard-badge{background:rgba(217,119,6,.2);color:#fbbf24;border:1px solid rgba(217,119,6,.3)}
.qt-battle   .qcard-vis{background:linear-gradient(145deg,#7f1d1d,#dc2626,#fca5a5)}
.qt-battle   .qcard-badge{background:rgba(220,38,38,.2);color:#f87171;border:1px solid rgba(220,38,38,.3)}
.qt-mystery  .qcard-vis{background:linear-gradient(145deg,#2e1065,#7c3aed,#c4b5fd)}
.qt-mystery  .qcard-badge{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
.qt-craft    .qcard-vis{background:linear-gradient(145deg,#064e3b,#059669,#6ee7b7)}
.qt-craft    .qcard-badge{background:rgba(5,150,105,.2);color:#34d399;border:1px solid rgba(5,150,105,.3)}
.qt-explore  .qcard-vis{background:linear-gradient(145deg,#0c4a6e,#0284c7,#7dd3fc)}
.qt-explore  .qcard-badge{background:rgba(2,132,199,.2);color:#38bdf8;border:1px solid rgba(2,132,199,.3)}

.map-bottom-area{padding:0 16px 36px}

/* ── SCREEN 5: MISSION ── */
#screen-mission{padding:0;min-height:100vh}
.mbar{display:flex;align-items:center;gap:10px;padding:13px 16px;
  background:rgba(4,11,24,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.mbar-back{background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;
  padding:2px 6px;line-height:1}
.mbar-type{font-size:9px;font-weight:900;letter-spacing:.18em;padding:4px 10px;
  border-radius:10px;text-transform:uppercase}
.mbar-title{font-size:14px;font-weight:900;color:var(--text);flex:1;line-height:1.2}

.mission-hero{width:100%;height:172px;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.mission-hero-em{font-size:80px;position:relative;z-index:1;animation:float 3s ease-in-out infinite}
.mission-hero-photo{position:absolute;top:8px;right:8px;width:64px;height:48px;
  border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.3)}
.mission-hero-photo img{width:100%;height:100%;object-fit:cover}

.companion-strip{display:flex;align-items:flex-start;gap:12px;
  padding:14px 18px 12px;background:rgba(0,212,255,.04);border-bottom:1px solid var(--border)}
.companion-avatar{width:56px;height:56px;flex-shrink:0}
.companion-bubble{flex:1;background:rgba(0,212,255,.08);border:1px solid var(--border);
  border-radius:0 12px 12px 12px;padding:10px 12px;
  font-size:13px;color:var(--text);line-height:1.6}
.companion-bubble b{color:var(--cyan)}

.mission-body{padding:20px;flex:1}
.mission-prompt{font-size:17px;font-weight:900;color:var(--text);
  line-height:1.65;margin-bottom:22px;letter-spacing:.02em}

.choices-grid{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:14px 16px;border:1px solid var(--border);
  background:rgba(0,212,255,.04);color:var(--text);font-size:15px;font-weight:700;
  border-radius:6px;cursor:pointer;transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:10px;font-family:inherit;width:100%;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.choice-btn:active{transform:scale(.97)}
.choice-btn.chosen{border-color:var(--cyan);background:rgba(0,212,255,.14);box-shadow:var(--glow-sm)}

.answer-textarea{width:100%;background:rgba(0,212,255,.04);
  border:1px solid var(--border);border-radius:6px;padding:14px;
  color:var(--text);font-size:15px;line-height:1.6;resize:none;
  font-family:inherit;min-height:110px;outline:none}
.answer-textarea:focus{border-color:var(--cyan);box-shadow:var(--glow-sm)}
.char-hint{font-size:11px;color:var(--text-dim);margin-top:6px;letter-spacing:.06em}

.mission-submit-area{padding:14px 20px 36px}

/* ── SCREEN 6: COMPLETE ── */
#screen-complete{padding:0;min-height:100vh;overflow-y:auto}
.complete-hero{padding:26px 20px 18px;text-align:center;position:relative;overflow:hidden}
.complete-burst{position:absolute;inset:0;pointer-events:none}
.complete-label{font-size:11px;letter-spacing:.22em;color:var(--cyan);
  text-transform:uppercase;margin-bottom:6px}
.complete-title{font-size:28px;font-weight:900;color:var(--text)}
.complete-subtitle{font-size:13px;color:var(--text-dim);margin-top:4px;letter-spacing:.04em}

.complete-companion{display:flex;flex-direction:column;align-items:center;padding:8px 20px 0;gap:6px}
.complete-svg{width:110px;height:110px}
.complete-cname{font-size:12px;color:var(--text-dim);letter-spacing:.1em}
.complete-msg{font-size:14px;font-weight:700;color:var(--text);
  background:rgba(0,212,255,.06);border:1px solid var(--border);
  border-radius:0 12px 12px 12px;padding:12px 16px;margin:8px 20px 0;line-height:1.7}

.gains-row{display:flex;gap:12px;padding:16px 20px}
.gain-blk{flex:1;background:rgba(0,212,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:14px 10px;text-align:center}
.gain-lbl{font-size:9px;letter-spacing:.15em;color:var(--text-dim);
  text-transform:uppercase;margin-bottom:6px}
.gain-val{font-size:24px;font-weight:900;color:var(--cyan)}
.gain-sub{font-size:10px;color:var(--text-dim);margin-top:2px}

.next-head{padding:14px 16px 8px;font-size:13px;font-weight:900;color:var(--text);
  letter-spacing:.1em;text-transform:uppercase}
.next-feed{display:flex;gap:12px;padding:4px 16px 20px;
  overflow-x:auto;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.next-feed::-webkit-scrollbar{display:none}
.complete-btns{padding:4px 20px 40px}

/* depth toast */
.depth-toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,var(--purple),var(--cyan));color:#000;
  font-size:13px;font-weight:900;padding:10px 22px;border-radius:20px;
  white-space:nowrap;opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);
  z-index:200;pointer-events:none;letter-spacing:.06em}
.depth-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

<!-- ===== SCREEN 1: TOP ===== -->
<div class="screen active" id="screen-top">
  <div class="top-stars" id="stars-wrap"></div>
  <div class="top-logo-wrap">
    <div class="top-logo-ring"></div>
    <div class="top-logo-ring2"></div>
    <div class="top-logo">🧭</div>
  </div>
  <div class="top-title">TOMORI</div>
  <div class="top-tagline">
    <b>写真</b> が冒険の扉。<br>
    今日は何を<b>探究</b>する？
  </div>
  <div class="top-cta">
    <button class="btn btn-primary" onclick="goTo('setup')">⚔️ 冒険をはじめる</button>
  </div>
</div>

<!-- ===== SCREEN 2: SETUP ===== -->
<div class="screen" id="screen-setup">
  <div class="setup-header">
    <div class="setup-step">STEP 1 — 探険者タイプを選ぼう</div>
    <div class="setup-title">きみはどんな<br>冒険者？</div>
    <div class="setup-sub">1回だけ選ぶよ。あとで変えられるよ！</div>
  </div>
  <div class="explorer-list" id="explorer-list"></div>

  <div class="mood-section" id="mood-section">

// =============================================
// SCREEN NAVIGATION
// =============================================
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

// =============================================
// SCREEN 1 → 2: SETUP
// =============================================
function buildSetup(){
  const list = document.getElementById('explorer-list');
  list.innerHTML = EXPLORERS.map(e=>`
    <div class="exp-card" id="exp-${e.key}" onclick="selectExplorer('${e.key}',this)">
      <div class="exp-icon">${e.icon}</div>
      <div class="exp-text">
        <div class="exp-name">${e.name}</div>
        <div class="exp-desc">${e.desc}</div>
      </div>
      <div class="exp-tick">✓</div>
    </div>`).join('');
  // pre-select if returning
  if(state.trait){
    const el=document.getElementById('exp-'+state.trait);
    if(el){el.classList.add('sel');document.getElementById('mood-section').classList.add('on');}
    if(state.mood) document.querySelector(`.mood-card[onclick*="${state.mood}"]`)?.classList.add('sel');
    updateSetupBtn();
  }
}

function selectExplorer(key,el){
  state.trait=key;
  document.querySelectorAll('.exp-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('mood-section').classList.add('on');
  updateSetupBtn();
}
function selectMood(key,el){
  state.mood=key;
  document.querySelectorAll('.mood-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  updateSetupBtn();
}
function updateSetupBtn(){
  const btn=document.getElementById('setup-next-btn');
  btn.disabled=!(state.trait && state.mood);
}
function finishSetup(){
  state.setupDone=true;
  if(state.photoUrl) goTo('map'); else goTo('photo');
}

// =============================================
// SCREEN 3: PHOTO
// =============================================
function handlePhoto(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    state.photoUrl=e.target.result;
    const prev=document.getElementById('photo-preview');
    prev.onload=()=>{
      state.category=analyzeImageCategory(prev)||'mystery';
      if(document.getElementById('screen-map').classList.contains('active')){
        refreshMap();
      }
    };
    prev.src=state.photoUrl;

    // show preview
    document.getElementById('cam-hero').style.display='none';
    const ps=document.getElementById('preview-state');
    ps.style.display='flex';
    document.getElementById('photo-next-btn').disabled=false;

    // update HUD thumbnail
    const hi=document.getElementById('hud-thumb-img');
    if(hi) hi.src=state.photoUrl;
    const mi=document.getElementById('map-photo-img');
    if(mi) mi.src=state.photoUrl;
    const mpt=document.getElementById('mission-photo-thumb');
    if(mpt) mpt.src=state.photoUrl;
  };
  reader.readAsDataURL(file);
  input.value='';
}

function analyzeImageCategory(img){
  try{
    const c=document.createElement('canvas');
    c.width=50;c.height=50;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,50,50);
    const d=ctx.getImageData(0,0,50,50).data;
    let r=0,g=0,b=0,px=0;
    for(let i=0;i<d.length;i+=4){if(d[i+3]>10){r+=d[i];g+=d[i+1];b+=d[i+2];px++;}}
    if(px===0)return'mystery';
    r/=px;g/=px;b/=px;
    if(g>r&&g>b&&g>70)return'plant';
    if(r>g&&r>b&&r>90)return'animal';
    if(r>100&&g>80&&b<80)return'food';
    if(b>r&&b>g&&b>70)return'vehicle';
    return'mystery';
  }catch{return'mystery';}
}

function startAdventure(){
  if(!state.photoUrl)return;
  const mi=document.getElementById('map-photo-img');
  if(mi)mi.src=state.photoUrl;
  const hi=document.getElementById('hud-thumb-img');
  if(hi)hi.src=state.photoUrl;
  refreshMap();
  goTo('map');
}

// =============================================
// SCREEN 4: MAP
// =============================================
function refreshMap(){
  updateHUD();
  const catInfo={
    animal:'🐾 いきもの',food:'🍜 たべもの',
    vehicle:'⚙️ きかい',plant:'🌿 しぜん',mystery:'✨ ふしぎ'
  };
  const badge=document.getElementById('map-cat-badge');
  if(badge)badge.textContent=catInfo[state.category]||'✨ ふしぎ';
  const dl=document.getElementById('map-depth-label');
  if(dl)dl.textContent=`深度 ${state.depth}`;

  const feed=document.getElementById('map-quest-feed');
  const quests=getQuestsForMap();
  feed.innerHTML=quests.map((q,i)=>questCardHTML(q,i,'map')).join('');
  // stagger
  feed.querySelectorAll('.qcard').forEach((c,i)=>{
    c.style.animationDelay=(i*70)+'ms';
  });
}

function updateHUD(){
  const pct=Math.min(state.depth/12*100,100);
  const fill=document.getElementById('hud-fill');
  if(fill)fill.style.width=pct+'%';
  const xp=document.getElementById('hud-xp');
  if(xp)xp.textContent=`⭐ ${state.xp}`;
}

function getQuestsForMap(){
  const trait=state.trait||'speed';
  const moodBoost={hot:1,ok:0,tired:-1}[state.mood]||0;
  const effectiveDepth=Math.max(0,state.depth+moodBoost);

  return QUESTS
    .filter(q=>
      (q.cat===state.category || q.cat==='mystery') &&
      q.dm<=effectiveDepth
    )
    .map(q=>({q, score:(q.tw[trait]||1)+(Math.random()*.4)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,5)
    .map(x=>x.q);
}

function questCardHTML(q,i,ctx){
  const stars='★'.repeat(q.dm+1)+'☆'.repeat(Math.max(0,3-q.dm-1));
  return `<div class="qcard qt-${q.type} new" style="animation-delay:${i*70}ms"
    onclick="${ctx==='map'?`openQuest('${q.id}')`:`openQuestFromComplete('${q.id}')`}">
    <div class="qcard-vis"><div class="qcard-em">${q.em}</div></div>
    <div class="qcard-info">
      <div class="qcard-badge">${q.fl}</div>
      <div class="qcard-title">${q.title}</div>
      <div class="qcard-meta">
        <div class="qcard-stars">${stars}</div>
        <div class="qcard-xp">+${q.xp}</div>
      </div>
    </div>
  </div>`;
}

// =============================================
// SCREEN 5: MISSION
// =============================================
function openQuest(id){
  const q=QUESTS.find(x=>x.id===id);
  if(!q)return;
  state.currentQuest=q;
  state.answer=null;
  state.choiceSelected=null;
  renderMission(q);
  goTo('mission');
}
function openQuestFromComplete(id){openQuest(id);}

function renderMission(q){
  // top bar
  const pill=document.getElementById('mbar-type-pill');
  const typeColors={
    discover:'background:rgba(217,119,6,.2);color:#fbbf24;border:1px solid rgba(217,119,6,.3)',
    battle:'background:rgba(220,38,38,.2);color:#f87171;border:1px solid rgba(220,38,38,.3)',
    mystery:'background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)',
    craft:'background:rgba(5,150,105,.2);color:#34d399;border:1px solid rgba(5,150,105,.3)',
    explore:'background:rgba(2,132,199,.2);color:#38bdf8;border:1px solid rgba(2,132,199,.3)',
  };
  pill.style.cssText=typeColors[q.type]||'';
  pill.textContent=q.fl;
  document.getElementById('mbar-title').textContent=q.title;

  // hero
  const hero=document.getElementById('mission-hero-vis');
  const heroGrads={
    discover:'linear-gradient(145deg,#92400e,#d97706,#fde68a)',
    battle:'linear-gradient(145deg,#7f1d1d,#dc2626,#fca5a5)',
    mystery:'linear-gradient(145deg,#2e1065,#7c3aed,#c4b5fd)',
    craft:'linear-gradient(145deg,#064e3b,#059669,#6ee7b7)',
    explore:'linear-gradient(145deg,#0c4a6e,#0284c7,#7dd3fc)',
  };
  hero.style.background=heroGrads[q.type]||heroGrads.mystery;
  document.getElementById('mission-hero-em').textContent=q.em;
  const mpt=document.getElementById('mission-photo-thumb');
  if(state.photoUrl&&mpt){mpt.src=state.photoUrl;}

  // companion
  const cat=state.category||'mystery';
  const svg=document.getElementById('companion-svg');
  svg.innerHTML=MONSTER_SVG[cat]||MONSTER_SVG.mystery;
  const info=MONSTER_INFO[cat]||MONSTER_INFO.mystery;
  const trait=state.trait||'brave';
  const introFn=COMPANION_INTRO[trait]||COMPANION_INTRO.brave;
  document.getElementById('companion-msg').innerHTML=
    `<b>${info.name}</b>より：${introFn(q)}`;

  // prompt
  document.getElementById('mission-prompt').textContent=q.prompt;

  // answer area
  const area=document.getElementById('answer-area');
  const submitBtn=document.getElementById('mission-submit-btn');
  submitBtn.disabled=true;

  if(q.ans==='choices'){
    area.innerHTML=`<div class="choices-grid">`+
      q.ch.map((c,i)=>`<button class="choice-btn" onclick="selectChoice(${i},this)">${c}</button>`).join('')+
      `</div>`;
  } else {
    area.innerHTML=`<textarea class="answer-textarea" id="ans-ta"
      placeholder="ここに書いてみよう！" oninput="textChanged(this)"></textarea>
      <div class="char-hint" id="char-hint">10文字以上書くと完成！</div>`;
  }
}

function selectChoice(i,el){
  state.choiceSelected=i;
  state.answer=state.currentQuest.ch[i];
  document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('chosen'));
  el.classList.add('chosen');
  document.getElementById('mission-submit-btn').disabled=false;
}

function textChanged(ta){
  const len=ta.value.trim().length;
  const hint=document.getElementById('char-hint');
  const btn=document.getElementById('mission-submit-btn');
  if(hint){
    if(len>=10){hint.textContent='✅ 完璧！';hint.style.color='var(--green)';}
    else{hint.textContent=`あと${10-len}文字書くと完成！`;hint.style.color='';}
  }
  btn.disabled=len<5;
  if(len>=5)state.answer=ta.value.trim();
}

// =============================================
// SCREEN 6: COMPLETE
// =============================================
function submitAnswer(){
  const q=state.currentQuest;
  if(!q)return;

  // XP & depth
  const prevDepth=state.depth;
  state.xp+=q.xp;
  state.depth+=1;
  state.completedIds.push(q.id);

  // Milestone check
  const milestones={3:'新エリア解放！🗺️',5:'ミドルエクスプローラー🔮',8:'ディープゾーン突入🌌',12:'レジェンド冒険者🏆'};
  const milestone=milestones[state.depth];

  // Build complete screen
  const label=document.getElementById('complete-label');
  const title=document.getElementById('complete-title');
  const sub=document.getElementById('complete-subtitle');

  const labels={discover:'ひみつ発見！',battle:'バトル勝利！',mystery:'なぞ解明！',craft:'作品完成！',explore:'探索完了！'};
  label.textContent=labels[q.type]||'クエスト完了！';

  const titles=['すごい！','やったね！','天才だ！','完璧！','レジェンド！'];
  title.textContent=titles[Math.min(Math.floor(state.depth/3),titles.length-1)];
  sub.textContent=`探索深度 ${prevDepth} → ${state.depth}`;

  // companion
  const cat=state.category||'mystery';
  document.getElementById('complete-companion-svg').innerHTML=MONSTER_SVG[cat]||MONSTER_SVG.mystery;
  document.getElementById('complete-cname').textContent=
    (MONSTER_INFO[cat]||MONSTER_INFO.mystery).name;

  const pool=COMPLETION_MESSAGES[q.type]||['よくやった！'];
  document.getElementById('complete-msg').textContent=
    pool[Math.floor(Math.random()*pool.length)];

  // gains
  document.getElementById('gain-depth').textContent=state.depth;
  document.getElementById('gain-depth-sub').textContent=milestone||`深度 ${state.depth}`;
  document.getElementById('gain-xp').textContent=`+${q.xp}`;

  // next quests (related)
  const nextQuests=getNextQuests(q);
  document.getElementById('next-quest-feed').innerHTML=
    nextQuests.map((nq,i)=>questCardHTML(nq,i,'complete')).join('');

  goTo('complete');
  spawnBurst();
  updateHUD();

  if(milestone){
    setTimeout(()=>showToast(milestone),600);
  }
}

function getNextQuests(completedQ){
  const trait=state.trait||'speed';
  // prefer same category, different type, +1 depth
  return QUESTS
    .filter(q=>
      q.id!==completedQ.id &&
      !state.completedIds.includes(q.id) &&
      (q.cat===completedQ.cat||q.cat==='mystery') &&
      q.dm<=state.depth
    )
    .map(q=>({q, score:(q.tw[trait]||1)+(q.type!==completedQ.type?.3:0)+(Math.random()*.3)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,4)
    .map(x=>x.q);
}

// =============================================
// EFFECTS
// =============================================
function spawnBurst(){
  const wrap=document.getElementById('complete-burst');
  if(!wrap)return;
  wrap.innerHTML='';
  const cols=['#ffd700','#f953c6','#38ef7d','#00b4d8','#ff6b6b','#a78bfa','#fb923c'];
  for(let i=0;i<50;i++){
    const el=document.createElement('div');
    el.className='complete-burst-piece';
    el.style.cssText=`left:${Math.random()*100}%;
      background:${cols[i%cols.length]};
      animation:confettiFall ${1+Math.random()*2}s ${Math.random()*.5}s linear forwards;
      width:${5+Math.random()*6}px;height:${8+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'}`;
    wrap.appendChild(el);
  }
}

function showToast(msg){
  const t=document.getElementById('depth-toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// =============================================
// STARS (top screen decoration)
// =============================================
function buildStars(){
  const wrap=document.getElementById('stars-wrap');
  if(!wrap)return;
  for(let i=0;i<50;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
    wrap.appendChild(s);
  }
}

// =============================================
// INIT
// =============================================
buildStars();
buildSetup();
</script>
