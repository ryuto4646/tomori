<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tomori - 学びモンスター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic Pro', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ---- Screen Base ---- */
.screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding: 24px 20px 32px;
  animation: fadeIn 0.35s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- Buttons ---- */
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 0.05em;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a2e;
  box-shadow: 0 4px 20px rgba(247,151,30,0.4);
}
.btn-secondary {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
}
.btn-success {
  background: linear-gradient(135deg, #11998e, #38ef7d);
  color: #fff;
  box-shadow: 0 4px 20px rgba(56,239,125,0.35);
}
.btn-danger {
  background: linear-gradient(135deg, #f953c6, #b91d73);
  color: #fff;
  box-shadow: 0 4px 20px rgba(249,83,198,0.35);
}

.btn + .btn { margin-top: 12px; }

/* ---- Screen 1: TOP ---- */
#screen-top {
  background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
}

.top-logo {
  font-size: 72px;
  margin-bottom: 8px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}

.top-title {
  font-size: 36px;
  font-weight: 900;
  color: #ffd200;
  text-shadow: 0 0 20px rgba(255,210,0,0.5);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.top-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 48px;
  line-height: 1.6;
}
.top-stars {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 3px; height: 3px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50%     { opacity: 1; transform: scale(1.5); }
}

/* ---- Screen 2: UPLOAD ---- */
#screen-upload {
  background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
}
.screen-header {
  margin-bottom: 24px;
}
.screen-step {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.screen-title {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
}
.screen-title span { color: #ffd200; }

.upload-area {
  border: 3px dashed rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.04);
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
}
.upload-area:hover { border-color: #ffd200; background: rgba(255,210,0,0.05); }
.upload-area.has-image { border-style: solid; border-color: #38ef7d; padding: 12px; }

.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-text { color: rgba(255,255,255,0.7); font-size: 15px; }
.upload-hint { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 6px; }

#photo-preview {
  width: 100%;
  max-height: 240px;
  object-fit: contain;
  border-radius: 12px;
  display: none;
}
#file-input { display: none; }

.category-section {
  margin-bottom: 20px;
  display: none;
}
.category-label {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 10px;
  font-weight: bold;
}
.category-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  padding: 8px 14px;
  border-radius: 24px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: #ffd200; color: #ffd200; }
.chip.selected { border-color: #ffd200; background: rgba(255,210,0,0.15); color: #ffd200; font-weight: bold; }

/* ---- Screen 3: TRAIT ---- */
#screen-trait {
  background: linear-gradient(160deg, #1a1a2e, #2d1b69, #11001c);
}
.trait-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
  margin-bottom: 20px;
}
.trait-card {
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 14px;
}
.trait-card:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
.trait-card.selected { border-color: #f7971e; background: rgba(247,151,30,0.12); }
.trait-emoji { font-size: 28px; flex-shrink: 0; }
.trait-info { flex: 1; }
.trait-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 2px; }
.trait-desc { font-size: 12px; color: rgba(255,255,255,0.55); }
.trait-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.trait-card.selected .trait-check {
  background: #f7971e;
  border-color: #f7971e;
}

/* ---- Screen 4: MONSTER ---- */
#screen-monster {
  background: linear-gradient(160deg, #0d0d0d, #1a0030, #000428);
  align-items: center;
  text-align: center;
}
.monster-photo-wrap {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
  max-height: 180px;
  background: rgba(255,255,255,0.05);
}
.monster-photo-wrap img {
  width: 100%;
  max-height: 180px;
  object-fit: cover;
  display: block;
}
.monster-appear-text {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.monster-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 24px 20px;
  width: 100%;
  margin-bottom: 24px;
}
.monster-emoji {
  font-size: 80px;
  display: block;
  margin-bottom: 12px;
  animation: monsterBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97) both;
}
@keyframes monsterBounce {
  0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  80%  { transform: scale(0.95) rotate(-3deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.monster-type {
  font-size: 11px;
  color: #ffd200;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.monster-name {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
}
.monster-message {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
  font-style: italic;
}

/* ---- Screen 5: MISSIONS ---- */
#screen-missions {
  background: linear-gradient(160deg, #0a1628, #0f3460, #1a1a2e);
}
.mission-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
  margin-bottom: 20px;
}
.mission-card {
  border-radius: 18px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}
.mission-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.08;
}
.mission-card.lv1 { background: rgba(56,239,125,0.1); border-color: rgba(56,239,125,0.3); }
.mission-card.lv2 { background: rgba(247,151,30,0.1); border-color: rgba(247,151,30,0.3); }
.mission-card.lv3 { background: rgba(249,83,198,0.1); border-color: rgba(249,83,198,0.3); }
.mission-card.selected.lv1 { border-color: #38ef7d; background: rgba(56,239,125,0.18); }
.mission-card.selected.lv2 { border-color: #f7971e; background: rgba(247,151,30,0.18); }
.mission-card.selected.lv3 { border-color: #f953c6; background: rgba(249,83,198,0.18); }
.mission-card:hover { transform: translateY(-2px); }

.mission-level-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}
.lv1 .mission-level-badge { background: rgba(56,239,125,0.25); color: #38ef7d; }
.lv2 .mission-level-badge { background: rgba(247,151,30,0.25); color: #f7971e; }
.lv3 .mission-level-badge { background: rgba(249,83,198,0.25); color: #f953c6; }

.mission-title { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.mission-body  { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.5; }

.mission-hint {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-bottom: 12px;
}

/* ---- Screen 6: ANSWER ---- */
#screen-answer {
  background: linear-gradient(160deg, #1a1a2e, #2d0052, #1a1a2e);
}
.answer-mission-card {
  background: rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 24px;
  border-left: 4px solid #f7971e;
}
.answer-mission-level {
  font-size: 11px;
  color: #f7971e;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.answer-mission-title { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 8px; }
.answer-mission-body  { font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.6; }

.answer-label {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
  font-weight: bold;
}
.answer-choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  margin-bottom: 20px;
}
.choice-btn {
  padding: 14px 18px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.choice-btn:hover   { border-color: #f7971e; background: rgba(247,151,30,0.1); }
.choice-btn.selected { border-color: #f7971e; background: rgba(247,151,30,0.2); font-weight: bold; }

.answer-textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  color: #fff;
  font-size: 15px;
  padding: 14px;
  resize: none;
  font-family: inherit;
  min-height: 120px;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}
.answer-textarea:focus { outline: none; border-color: #f7971e; }
.answer-textarea::placeholder { color: rgba(255,255,255,0.3); }

.audio-ui {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,0.1);
}
.mic-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f953c6, #b91d73);
  border: none;
  font-size: 32px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(249,83,198,0.4);
  transition: transform 0.1s;
}
.mic-btn:active { transform: scale(0.93); }
.mic-hint { color: rgba(255,255,255,0.5); font-size: 13px; }

/* ---- Screen 7: RESULT ---- */
#screen-result {
  background: linear-gradient(160deg, #0d0d0d, #1a0030, #000428);
  align-items: center;
  text-align: center;
}
.result-xp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: rgba(255,210,0,0.15);
  border: 1px solid rgba(255,210,0,0.3);
  border-radius: 20px;
  color: #ffd200;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 20px;
}
.result-monster-emoji {
  font-size: 80px;
  display: block;
  margin-bottom: 16px;
  animation: resultPop 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both;
}
@keyframes resultPop {
  0%  { transform: scale(0.5) rotate(-15deg); opacity: 0; }
  70% { transform: scale(1.15) rotate(5deg); }
  100%{ transform: scale(1) rotate(0); opacity: 1; }
}
.result-badge {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-reaction {
  font-size: 26px;
  font-weight: 900;
  color: #ffd200;
  margin-bottom: 12px;
  line-height: 1.3;
  text-shadow: 0 0 20px rgba(255,210,0,0.4);
}
.result-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
  line-height: 1.6;
}
.result-effect {
  font-size: 14px;
  color: #38ef7d;
  font-weight: bold;
  margin-bottom: 32px;
}
.confetti-wrap {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -10px;
  width: 8px; height: 12px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.result-buttons { width: 100%; }

/* ---- Misc ---- */
.spacer { flex: 1; }
.mt-auto { margin-top: auto; }

/* XP bar (mini) */
.xp-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 20px;
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  border-radius: 3px;
  transition: width 1s ease;
}

.back-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.back-btn:hover { color: rgba(255,255,255,0.7); }

/* ============================================
   ANIMATION ENHANCEMENTS
   ============================================ */

/* Screen slide-in from right (forward) */
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(36px); }
  to   { opacity: 1; transform: translateX(0); }
}
/* Screen slide-in from left (back) */
@keyframes fadeInBack {
  from { opacity: 0; transform: translateX(-36px); }
  to   { opacity: 1; transform: translateX(0); }
}
.screen.back-enter.active { animation: fadeInBack 0.35s cubic-bezier(0.25,0.46,0.45,0.94); }

/* ---- Button shimmer ---- */
.btn-primary { position: relative; overflow: hidden; }
.btn-primary::after {
  content: '';
  position: absolute;
  top: 0; left: -150%;
  width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  animation: btnShimmer 2.8s ease-in-out infinite;
}
@keyframes btnShimmer {
  0%   { left: -150%; }
  45%  { left: 150%; }
  100% { left: 150%; }
}

/* ---- Mission card staggered entrance ---- */
.mission-card { animation: missionIn 0.45s ease both; }
.mission-card:nth-child(1) { animation-delay: 0.05s; }
.mission-card:nth-child(2) { animation-delay: 0.17s; }
.mission-card:nth-child(3) { animation-delay: 0.29s; }
@keyframes missionIn {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
/* Card selected pop */
@keyframes cardPop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.045); }
  100% { transform: scale(1); }
}
.trait-card.pop { animation: cardPop 0.25s ease; }

/* ---- Ripple ---- */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  transform: scale(0);
  animation: rippleAnim 0.5s linear forwards;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(5); opacity: 0; }
}

/* ---- Shockwave rings (monster screen) ---- */
.shockwave {
  position: absolute;
  top: 50%; left: 50%;
  width: 70px; height: 70px;
  margin: -35px 0 0 -35px;
  border-radius: 50%;
  border: 3px solid #ffd200;
  animation: shockwaveExpand 0.75s ease-out forwards;
  pointer-events: none;
}
.shockwave.r2 { animation-delay: 0.18s; border-color: #f7971e; }
.shockwave.r3 { animation-delay: 0.36s; border-color: rgba(249,83,198,0.6); }
@keyframes shockwaveExpand {
  from { transform: scale(0); opacity: 1; }
  to   { transform: scale(6); opacity: 0; }
}

/* Monster card glow on appear */
.monster-card { transition: box-shadow 0.6s, border-color 0.6s; }
.monster-card.glowing {
  box-shadow: 0 0 36px rgba(255,210,0,0.3), 0 0 70px rgba(255,210,0,0.1);
  border-color: rgba(255,210,0,0.4);
}

/* Monster appear text pulse */
.monster-appear-text { animation: maPulse 1.2s ease-in-out infinite; }
@keyframes maPulse {
  0%,100% { opacity: 0.45; letter-spacing: 0.20em; }
  50%     { opacity: 1;    letter-spacing: 0.32em; }
}

/* Screen flash on monster reveal */
#screen-monster { transition: background 0.1s; }
#screen-monster.flashing { animation: monsterFlash 0.5s ease; }
@keyframes monsterFlash {
  0%   { background: linear-gradient(160deg,#0d0d0d,#1a0030,#000428); }
  15%  { background: linear-gradient(160deg,#200050,#3d0080,#001060); }
  100% { background: linear-gradient(160deg,#0d0d0d,#1a0030,#000428); }
}

/* Result: burst particles */
.burst-piece {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  top: 50%; left: 50%;
  pointer-events: none;
  animation: burstFly 0.65s ease-out forwards;
}
@keyframes burstFly {
  from { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  to   { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
}

/* XP count-up pop */
@keyframes xpNumPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.5); color: #fff; }
  100% { transform: scale(1); }
}
.xp-pop { display: inline-block; animation: xpNumPop 0.4s ease; }

/* Choice selected checkmark */
.choice-btn { position: relative; overflow: hidden; }
.choice-btn.selected { padding-right: 40px; }
.choice-btn.selected::after {
  content: '✓';
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  color: #ffd200;
  font-weight: 900;
  animation: checkPop 0.2s ease;
}
@keyframes checkPop {
  from { transform: translateY(-50%) scale(0) rotate(-45deg); }
  to   { transform: translateY(-50%) scale(1) rotate(0); }
}
</style>
</head>
<body>
<div id="app">

  <!-- ===== SCREEN 1: TOP ===== -->
  <div class="screen active" id="screen-top">
    <div class="top-stars" id="stars-container"></div>
    <div class="top-logo">🌟</div>
    <div class="top-title">Tomori</div>
    <div class="top-subtitle">写真から学びが始まる<br>探究ミッションアプリ</div>
    <button class="btn btn-primary" onclick="goTo('upload')" style="max-width:280px">
      ✨ はじめる
    </button>
  </div>

  <!-- ===== SCREEN 2: UPLOAD ===== -->
  <div class="screen" id="screen-upload">

      { level: 2, title: '⚔️ 謎を解け！', body: 'この写真にかくれた秘密のアイテムは？', answerType: 'choices', choices: ['古代の地図📜', '魔法の石💎', '秘密の鍵🗝️'] },
      { level: 3, title: '🏆 伝説の謎に挑め！', body: 'この写真が謎への手がかりだとしたら、その謎とは？', answerType: 'text' },
    ],
  },
};

// ============================
// DATA: REACTIONS
// ============================
const REACTIONS = [
  { msg: 'いいところに気づいたね！', sub: 'その目の付け所、最高だよ！', effect: '🎉 モンスターと仲良くなった！' },
  { msg: 'その見方、おもしろい！', sub: 'みんなと違う考え方ができるって、すごいことだよ！', effect: '⭐ 新しいミッションが開放された！' },
  { msg: 'なるほど！その考えで\nいってみよう！', sub: 'もっと深く考えると、またちがうことが見えてくるよ！', effect: '💥 モンスターを倒した！経験値ゲット！' },
  { msg: 'すごい！モンスターも\n感動してるよ！', sub: 'その発見、大事にしてね！', effect: '✨ レアスキルを習得した！' },
  { msg: 'その答え、ぴったり！', sub: '考える力が育ってるの、わかるよ！', effect: '🌟 探究ポイント+100！次のステージへ！' },
];

const LEVEL_LABELS = { 1: 'LEVEL 1 すぐできる', 2: 'LEVEL 2 少し観察', 3: 'LEVEL 3 少し考える' };
const LEVEL_CLASS  = { 1: 'lv1', 2: 'lv2', 3: 'lv3' };

// ============================
// NAVIGATION
// ============================
function goTo(screenId) {
  const fromIdx = SCREEN_ORDER.indexOf(currentScreen);
  const toIdx   = SCREEN_ORDER.indexOf(screenId);
  const goBack  = toIdx < fromIdx;

  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active','back-enter');
  });
  const next = document.getElementById('screen-' + screenId);
  if (goBack) next.classList.add('back-enter');
  next.classList.add('active');
  currentScreen = screenId;
}

// ---- Ripple helper ----
function addRipple(el, e) {
  const rect = el.getBoundingClientRect();
  const x = (e ? e.clientX : rect.left + rect.width/2)  - rect.left;
  const y = (e ? e.clientY : rect.top  + rect.height/2) - rect.top;
  const size = Math.max(rect.width, rect.height) * 1.5;
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
  el.style.position = 'relative';
  el.style.overflow = 'hidden';
  el.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function resetApp() {
  state.photoUrl = null;
  state.category = null;
  state.trait = null;
  state.monster = null;
  state.missions = [];
  state.selectedMissionIdx = null;
  state.answeredMissions = new Set();
  state.xp = 0;
  // Reset upload screen
  const area = document.getElementById('upload-area');
  area.classList.remove('has-image');
  document.getElementById('photo-preview').style.display = 'none';
  area.querySelector('.upload-icon').style.display = '';
  area.querySelector('.upload-text').style.display = '';
  area.querySelector('.upload-hint').style.display = '';
  document.getElementById('category-section').style.display = 'none';
  const nextBtn = document.getElementById('upload-next-btn');
  nextBtn.disabled = true;
  nextBtn.style.opacity = '0.4';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('file-input').value = '';
}

// ============================
// SCREEN 2: UPLOAD
// ============================
function handlePhotoUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    state.photoUrl = e.target.result;
    const preview = document.getElementById('photo-preview');
    preview.src = state.photoUrl;
    preview.style.display = 'block';
    const area = document.getElementById('upload-area');
    area.classList.add('has-image');
    area.querySelector('.upload-icon').style.display = 'none';
    area.querySelector('.upload-text').style.display = 'none';
    area.querySelector('.upload-hint').style.display = 'none';
    document.getElementById('category-section').style.display = 'block';
    updateUploadNextBtn();
  };
  reader.readAsDataURL(file);
}

function selectCategory(cat, el) {
  state.category = cat;
  document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateUploadNextBtn();
}

function updateUploadNextBtn() {
  const btn = document.getElementById('upload-next-btn');
  const ok = state.photoUrl && state.category;
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.4';
}

// ============================
// SCREEN 3: TRAIT
// ============================
function buildTraitList() {
  const list = document.getElementById('trait-list');
  list.innerHTML = TRAITS.map(t => `
    <div class="trait-card" id="trait-${t.key}" onclick="selectTrait('${t.key}', this, event)">
      <div class="trait-emoji">${t.emoji}</div>
      <div class="trait-info">
        <div class="trait-name">${t.name}</div>
        <div class="trait-desc">${t.desc}</div>
      </div>
      <div class="trait-check">✓</div>
    </div>
  `).join('');
}

function selectTrait(key, el, e) {
  state.trait = key;
  document.querySelectorAll('.trait-card').forEach(c => c.classList.remove('selected','pop'));
  el.classList.add('selected');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('pop');
  addRipple(el, e);
  const btn = document.getElementById('trait-next-btn');
  btn.disabled = false;
  btn.style.opacity = '1';
}

// ============================
// SCREEN 4: MONSTER
// ============================
function goToMonster() {
  if (!state.trait) return;
  state.monster = MONSTERS[state.category] || MONSTERS.mystery;
  document.getElementById('monster-photo').src = state.photoUrl;
  document.getElementById('monster-emoji').textContent = state.monster.emoji;
  document.getElementById('monster-type').textContent = state.monster.type;
  document.getElementById('monster-name').textContent = state.monster.name;
  document.getElementById('monster-message').textContent = '「' + state.monster.message + '」';

  // Reset emoji animation
  const emojiEl = document.getElementById('monster-emoji');
  emojiEl.style.animation = 'none';
  void emojiEl.offsetWidth;
  emojiEl.style.animation = '';

  goTo('monster');

  // Screen flash
  const screen = document.getElementById('screen-monster');
  screen.classList.remove('flashing');
  void screen.offsetWidth;
  screen.classList.add('flashing');

  // Shockwave rings
  const card = document.getElementById('monster-card');
  card.classList.remove('glowing');
  ['', 'r2', 'r3'].forEach((cls, i) => {
    setTimeout(() => {
      const sw = document.createElement('div');
      sw.className = 'shockwave' + (cls ? ' ' + cls : '');
      card.appendChild(sw);
      sw.addEventListener('animationend', () => sw.remove());
    }, i * 10);
  });

  // Glow card
  setTimeout(() => card.classList.add('glowing'), 400);
}

// ============================
// SCREEN 5: MISSIONS
// ============================
function buildMissions() {
  const cat = state.category || 'mystery';
  const trait = state.trait || 'short_attention';
  const data = (MISSIONS[cat] && MISSIONS[cat][trait]) || MISSIONS.mystery.short_attention;
  state.missions = data;
  state.selectedMissionIdx = null;
  const list = document.getElementById('mission-list');
  list.innerHTML = data.map((m, i) => `
    <div class="mission-card ${LEVEL_CLASS[m.level]}" id="mission-card-${i}" onclick="selectMission(${i}, this, event)">
      <div class="mission-level-badge">${LEVEL_LABELS[m.level]}</div>
      <div class="mission-title">${m.title}</div>
      <div class="mission-body">${m.body}</div>
    </div>
  `).join('');
  const btn = document.getElementById('mission-next-btn');
  btn.disabled = true;
  btn.style.opacity = '0.4';
  goTo('missions');
}

function selectMission(idx, el, e) {
  state.selectedMissionIdx = idx;
  document.querySelectorAll('.mission-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  addRipple(el, e);
  const btn = document.getElementById('mission-next-btn');
  btn.disabled = false;
  btn.style.opacity = '1';
}

// ============================
// SCREEN 6: ANSWER
// ============================
function goToAnswer() {
  if (state.selectedMissionIdx === null) return;
  const m = state.missions[state.selectedMissionIdx];
  // Mission card
  const card = document.getElementById('answer-mission-card');
  card.innerHTML = `
    <div class="answer-mission-level">${LEVEL_LABELS[m.level]}</div>
    <div class="answer-mission-title">${m.title}</div>
    <div class="answer-mission-body">${m.body}</div>
  `;
  // Answer UI
  const ui = document.getElementById('answer-ui');
  const trait = state.trait;
  if (m.answerType === 'choices' && m.choices) {
    ui.innerHTML = '<div class="answer-choices">' +
      m.choices.map((c, i) => `<button class="choice-btn" onclick="selectChoice(this)">${c}</button>`).join('') +
      '</div>';
  } else if (trait === 'audio_preferred' && m.answerType === 'text') {
    ui.innerHTML = `
      <div class="audio-ui">
        <button class="mic-btn" onclick="this.textContent='⏹️'; this.style.background='linear-gradient(135deg,#38ef7d,#11998e)'">🎤</button>
        <div class="mic-hint">マイクボタンを押して声で答えよう</div>
        <div style="color:rgba(255,255,255,0.4);font-size:11px">または下に文字で入力</div>
      </div>
      <textarea class="answer-textarea" id="answer-text" placeholder="こたえを入力…" oninput="checkAnswerReady()"></textarea>
    `;
  } else {
    ui.innerHTML = `<textarea class="answer-textarea" id="answer-text" placeholder="じゆうにかいてみよう…" oninput="checkAnswerReady()"></textarea>`;
  }
  // Submit btn state
  const submitBtn = document.getElementById('submit-btn');
  if (m.answerType === 'choices') {
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.4';
  } else {
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
  }
  goTo('answer');
}

function selectChoice(el) {
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.answer = el.textContent;
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = false;
  submitBtn.style.opacity = '1';
}

function checkAnswerReady() {
  const ta = document.getElementById('answer-text');
  const submitBtn = document.getElementById('submit-btn');
  const ok = ta && ta.value.trim().length > 0;
  submitBtn.disabled = !ok;
  submitBtn.style.opacity = ok ? '1' : '0.4';
}

// ============================
// SCREEN 7: RESULT
// ============================
function submitAnswer() {
  state.answeredMissions.add(state.selectedMissionIdx);
  const gained = [30, 50, 80][state.missions[state.selectedMissionIdx].level - 1];
  state.prevXp = state.xp;
  state.xp += gained;
  const reaction = REACTIONS[Math.floor(Math.random() * REACTIONS.length)];

  document.getElementById('result-monster-emoji').textContent = state.monster.emoji;
  document.getElementById('result-reaction').textContent = reaction.msg;
  document.getElementById('result-sub').textContent = reaction.sub;
  document.getElementById('result-effect').textContent = reaction.effect;
  document.getElementById('xp-label').textContent = `+${gained} XP ゲット！`;

  // XP bar
  const pct = Math.min(state.xp / 300 * 100, 100);
  setTimeout(() => { document.getElementById('xp-bar').style.width = pct + '%'; }, 200);

  // Reset monster emoji animation
  const me = document.getElementById('result-monster-emoji');
  me.style.animation = 'none';
  void me.offsetWidth;
  me.style.animation = '';

  goTo('result');

  // XP count-up
  setTimeout(() => animateXP(state.prevXp, state.xp, 900), 300);

  // Confetti + burst
  setTimeout(() => {
    spawnConfetti();
    spawnBurst();
  }, 150);
}

// XP count-up animation
function animateXP(from, to, duration) {
  const el = document.getElementById('xp-label');
  const gained = to - from;
  const start = performance.now();
  const tick = (now) => {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const cur = Math.round(from + (to - from) * ease);
    el.textContent = `合計 ${cur} XP`;
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      el.innerHTML = `合計 <span class="xp-pop">${to} XP</span>`;
    }
  };
  requestAnimationFrame(tick);
}

// Burst from center
function spawnBurst() {
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#ffd200','#f953c6','#38ef7d','#00b4d8','#ff6b6b'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'burst-piece';
    const angle = (i / 20) * 360;
    const dist = 80 + Math.random() * 120;
    const rad = angle * Math.PI / 180;
    el.style.setProperty('--tx', `${Math.cos(rad) * dist}px`);
    el.style.setProperty('--ty', `${Math.sin(rad) * dist}px`);
    el.style.background = colors[i % colors.length];
    el.style.animationDuration = (0.4 + Math.random() * 0.35) + 's';
    el.style.width = el.style.height = (6 + Math.random() * 8) + 'px';
    wrap.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#ffd200','#f953c6','#38ef7d','#00b4d8','#ff6b6b','#ffd166','#a78bfa','#fb923c'];
  const shapes = ['rect','circle','star'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size  = 6 + Math.random() * 8;
    el.style.left   = Math.random() * 100 + '%';
    el.style.background = color;
    el.style.animationDuration = (1.4 + Math.random() * 2.2) + 's';
    el.style.animationDelay    = (Math.random() * 1.0) + 's';
    el.style.width  = size + 'px';
    el.style.height = (shape === 'circle' ? size : size * (0.5 + Math.random())) + 'px';
    el.style.borderRadius = shape === 'circle' ? '50%' : shape === 'star' ? '2px' : '1px';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    if (shape === 'star') {
      el.style.clipPath = 'polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)';
    }
    wrap.appendChild(el);
  }
}

function nextMission() {
  buildMissions();
}

// ============================
// INIT
// ============================
function init() {
  // Stars on top screen
  const container = document.getElementById('stars-container');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    container.appendChild(s);
  }
  buildTraitList();
}

init();
</script>
